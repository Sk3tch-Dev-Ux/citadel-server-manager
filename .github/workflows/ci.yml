name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend

  backend-test:
    name: Backend Tests
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    env:
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

  frontend-lint:
    name: Frontend Lint
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: web/frontend
      - run: npm run lint
        working-directory: web/frontend

  frontend-build:
    name: Frontend Build
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: web/frontend
      - run: npm run build
        working-directory: web/frontend

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: windows-latest
    env:
      JWT_SECRET: ci-e2e-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      # Root `npm ci` installs @playwright/test and (via postinstall) the
      # backend + web/frontend deps the dev server needs.
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install chromium
      # playwright.config.js auto-starts `npm run dev` (backend + Vite on :5173)
      # and waits for it before running the smoke tests.
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
