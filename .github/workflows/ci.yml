name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend

  backend-test:
    name: Backend Tests
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    env:
      JWT_SECRET: ci-test-secret
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

  frontend-lint:
    name: Frontend Lint
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: web/frontend
      - run: npm run lint
        working-directory: web/frontend

  frontend-build:
    name: Frontend Build
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: web/frontend
      - run: npm run build
        working-directory: web/frontend
