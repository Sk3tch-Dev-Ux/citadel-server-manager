name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Citadel Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install NSIS (makensis)
        run: choco install nsis -y --no-progress

      - name: Install NSSM
        run: choco install nssm -y --no-progress

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      # Audit N4 — decode the code-signing PFX from a GitHub Actions secret
      # if one is configured. The actual signing happens inside
      # installer/build.js via signtool; this step just materializes the
      # PFX to disk so build.js can find it. No-op when the secret is
      # unset (release ships unsigned, same as before this step landed).
      #
      # To enable code signing for releases:
      #   1. Get an OV or EV code-signing cert (.pfx). See installer/SIGNING.md.
      #   2. base64-encode it: `certutil -encode cert.pfx cert.b64.txt`
      #      (Windows) or `base64 cert.pfx > cert.b64.txt` (mac/linux).
      #   3. Repo Settings → Secrets and variables → Actions, create:
      #        CITADEL_SIGN_PFX_BASE64 = (contents of cert.b64.txt)
      #        CITADEL_SIGN_PASSWORD  = (the PFX password)
      - name: Decode code-signing certificate
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.CITADEL_SIGN_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_B64)) {
            Write-Output "No CITADEL_SIGN_PFX_BASE64 secret set — release will be unsigned."
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP 'citadel-signing.pfx'
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_B64))
          Write-Output "Decoded signing cert to $pfxPath"
          "CITADEL_SIGN_PFX=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build installer
        env:
          # These are read by installer/build.js → signInstallerIfConfigured().
          # When the GitHub secret is unset, CITADEL_SIGN_PASSWORD ends up
          # empty and the signing step is skipped (with a heads-up log).
          # CITADEL_SIGN_PFX is set in the previous step only when the
          # base64 secret was present.
          CITADEL_SIGN_PASSWORD: ${{ secrets.CITADEL_SIGN_PASSWORD }}
        run: node installer/build.js

      - name: Verify installer output
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $exe = "build/CitadelSetup-$version.exe"
          if (!(Test-Path $exe)) {
            Write-Error "Installer not found at $exe"
            Get-ChildItem build -ErrorAction SilentlyContinue | Format-Table Name, Length
            exit 1
          }
          $size = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Output "Installer built: $exe ($size MB)"
          # Emit for later steps
          "INSTALLER_PATH=$exe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "INSTALLER_SIZE_MB=$size" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/CitadelSetup-*.exe
            build/latest.yml
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          name: Citadel ${{ github.ref_name }}
          body: |
            ## Citadel ${{ github.ref_name }}

            ### Installation
            1. Download **`CitadelSetup-*.exe`** below
            2. Double-click to run — Windows will ask for admin permission
            3. Follow the installer (next → next → install)
            4. Browser opens automatically at **http://localhost:3001** for the setup wizard

            ### Upgrading
            Download and run the new `CitadelSetup-*.exe`. The installer preserves your existing `data/` and `.env` automatically.

            ### Uninstalling
            Windows Settings → Apps → **Citadel Server Manager** → Uninstall.
            You'll be prompted to keep or delete your server configs.

            ### What's Included
            - Web dashboard + backend API (bundled Node.js runtime — no separate install needed)
            - Discord bot (auto-starts if configured in setup wizard)
            - @CitadelAdmin in-game DayZ mod
            - Windows service (auto-start on boot via NSSM)

            ---
            _Full changelog below:_
