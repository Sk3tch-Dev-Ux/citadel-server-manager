name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Citadel Bundle
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install NSSM
        run: choco install nssm -y

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: node build/bundle.js

      - name: Verify output exists
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $zip = "dist/Citadel-v$version-win-x64.zip"
          if (!(Test-Path $zip)) {
            Write-Error "Zip not found at $zip"
            exit 1
          }
          $size = (Get-Item $zip).Length / 1MB
          Write-Output "Bundle built: $zip ($([math]::Round($size, 1)) MB)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Citadel-*.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          name: Citadel ${{ github.ref_name }}
          body: |
            ## Citadel ${{ github.ref_name }}

            ### Installation
            1. Download `Citadel-*-win-x64.zip` below
            2. Extract the zip
            3. Right-click `install.ps1` → **Run with PowerShell** (as Administrator)
            4. Open **http://localhost:3001** to complete the setup wizard

            ### Upgrading
            1. Download and extract the new zip
            2. Run `install.ps1` — it preserves your existing `data/` and `.env`

            ### Uninstalling
            - Run `uninstall.ps1` as Administrator

            ### What's Included
            - Web Dashboard + API server (bundled, no node_modules needed)
            - Discord Bot (auto-starts if configured)
            - @CitadelAdmin DayZ mod integration
            - Windows Service (auto-start on boot)

            ---
            _Full changelog below:_
