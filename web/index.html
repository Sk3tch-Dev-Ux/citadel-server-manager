<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayZ Server Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep: #0a0c0f;
      --bg-surface: #111418;
      --bg-card: #181c22;
      --bg-elevated: #1e2329;
      --border: #2a2f38;
      --border-active: #3a4150;
      --text-primary: #e8eaed;
      --text-secondary: #8b919a;
      --text-muted: #5a6170;
      --accent-green: #00ff6a;
      --accent-green-dim: #00cc55;
      --accent-red: #ff3b3b;
      --accent-red-dim: #cc2222;
      --accent-yellow: #ffb800;
      --accent-blue: #3b82f6;
      --accent-blue-dim: #2563eb;
      --accent-purple: #8b5cf6;
      --font-display: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 8px;
      --radius-lg: 12px;
      --glow-green: 0 0 20px rgba(0,255,106,0.15);
      --glow-red: 0 0 20px rgba(255,59,59,0.15);
    }

    html, body, #root { height: 100%; }
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-display);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

    /* Layout */
    .app { display: flex; height: 100vh; }
    
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--bg-deep);
      letter-spacing: -1px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-weight: 400;
    }

    .server-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--font-mono);
    }

    .status-running {
      background: rgba(0,255,106,0.1);
      color: var(--accent-green);
      border: 1px solid rgba(0,255,106,0.2);
    }

    .status-stopped {
      background: rgba(255,59,59,0.1);
      color: var(--accent-red);
      border: 1px solid rgba(255,59,59,0.2);
    }

    .status-starting, .status-stopping {
      background: rgba(255,184,0,0.1);
      color: var(--accent-yellow);
      border: 1px solid rgba(255,184,0,0.2);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
    }

    .nav-section {
      margin-bottom: 20px;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 8px;
      margin-bottom: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-secondary);
      user-select: none;
    }

    .nav-item:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: rgba(0,255,106,0.08);
      color: var(--accent-green);
    }

    .nav-item.active .nav-icon {
      color: var(--accent-green);
    }

    .nav-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-badge {
      margin-left: auto;
      background: var(--accent-green);
      color: var(--bg-deep);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      font-family: var(--font-mono);
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-purple);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: white;
      flex-shrink: 0;
    }

    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-role {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      text-transform: uppercase;
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 56px;
      min-height: 56px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-body { padding: 20px; }

    /* Grid */
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }

    /* Stat Cards */
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .stat-card.green::after { background: var(--accent-green); }
    .stat-card.blue::after { background: var(--accent-blue); }
    .stat-card.yellow::after { background: var(--accent-yellow); }
    .stat-card.purple::after { background: var(--accent-purple); }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--font-mono);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-value.green { color: var(--accent-green); }
    .stat-value.blue { color: var(--accent-blue); }
    .stat-value.yellow { color: var(--accent-yellow); }
    .stat-value.purple { color: var(--accent-purple); }

    .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      font-family: var(--font-mono);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-display);
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
      user-select: none;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent-green);
      color: var(--bg-deep);
    }
    .btn-primary:hover { background: var(--accent-green-dim); }

    .btn-danger {
      background: var(--accent-red);
      color: white;
    }
    .btn-danger:hover { background: var(--accent-red-dim); }

    .btn-warning {
      background: var(--accent-yellow);
      color: var(--bg-deep);
    }

    .btn-blue {
      background: var(--accent-blue);
      color: white;
    }
    .btn-blue:hover { background: var(--accent-blue-dim); }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-elevated); color: var(--text-primary); }

    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .btn-icon {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-icon:hover { border-color: var(--border-active); color: var(--text-primary); }

    /* Tables */
    .table-container { overflow-x: auto; }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 16px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .player-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    .ping { font-family: var(--font-mono); font-size: 12px; }
    .ping.good { color: var(--accent-green); }
    .ping.medium { color: var(--accent-yellow); }
    .ping.bad { color: var(--accent-red); }

    /* Inputs */
    .input-group {
      display: flex;
      gap: 8px;
    }

    input[type="text"],
    input[type="number"],
    input[type="password"],
    textarea,
    select {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      font-size: 13px;
      font-family: var(--font-display);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent-green);
      box-shadow: 0 0 0 2px rgba(0,255,106,0.1);
    }

    textarea {
      font-family: var(--font-mono);
      font-size: 12px;
      resize: vertical;
      min-height: 200px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 16px; }

    /* Toggle */
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      display: inline-block;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 11px;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--text-secondary);
      transition: 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--accent-green);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
      background: var(--bg-deep);
    }

    /* Console / Log Viewer */
    .console {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 11.5px;
      line-height: 1.7;
      max-height: 400px;
      overflow-y: auto;
      padding: 12px;
    }

    .log-entry {
      padding: 2px 0;
      display: flex;
      gap: 10px;
    }

    .log-time {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .log-level {
      flex-shrink: 0;
      font-weight: 600;
      width: 42px;
      text-align: center;
      border-radius: 3px;
      font-size: 10px;
      padding: 1px 0;
      text-transform: uppercase;
    }

    .log-level.info { color: var(--accent-blue); }
    .log-level.warn { color: var(--accent-yellow); }
    .log-level.error { color: var(--accent-red); }

    .log-source {
      color: var(--accent-purple);
      flex-shrink: 0;
      min-width: 60px;
    }

    .log-msg { color: var(--text-secondary); word-break: break-all; }

    /* Chart placeholder */
    .chart-area {
      height: 200px;
      background: var(--bg-deep);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chart-bars {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding: 16px 16px 8px;
    }

    .chart-bar {
      flex: 1;
      background: var(--accent-green);
      border-radius: 2px 2px 0 0;
      min-height: 4px;
      opacity: 0.6;
      transition: height 0.3s;
    }

    .chart-bar:hover { opacity: 1; }

    .chart-labels {
      display: flex;
      justify-content: space-between;
      padding: 4px 16px 8px;
      font-size: 9px;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    /* Mod list */
    .mod-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .mod-item:last-child { border-bottom: none; }

    .mod-order {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      width: 24px;
      text-align: center;
    }

    .mod-name {
      flex: 1;
      font-weight: 600;
      font-size: 13px;
    }

    .mod-id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Workshop Search */
    .workshop-search-box {
      position: relative;
    }
    .workshop-search-box input {
      width: 100%;
      padding-left: 36px;
    }
    .workshop-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }
    .workshop-results {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      max-height: 420px;
      overflow-y: auto;
    }
    .workshop-result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .workshop-result-item:hover {
      border-color: var(--accent-green);
      background: var(--bg-elevated);
    }
    .workshop-result-item.already-installed {
      opacity: 0.5;
      border-color: var(--border);
      cursor: default;
    }
    .workshop-thumb {
      width: 64px;
      height: 40px;
      border-radius: 4px;
      object-fit: cover;
      background: var(--bg-deep);
      flex-shrink: 0;
    }
    .workshop-info {
      flex: 1;
      min-width: 0;
    }
    .workshop-info-name {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .workshop-info-meta {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-top: 2px;
      display: flex;
      gap: 12px;
    }
    .workshop-add-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      background: var(--accent-green);
      color: var(--bg-deep);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .workshop-add-btn:hover { opacity: 0.85; }
    .workshop-add-btn:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: default;
    }
    .workshop-loading {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .workshop-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .workshop-tab {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .workshop-tab:hover { border-color: var(--border-active); }
    .workshop-tab.active {
      background: var(--accent-green);
      color: var(--bg-deep);
      border-color: var(--accent-green);
    }

    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg-deep);
      position: relative;
    }

    .login-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(0,255,106,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.04) 0%, transparent 50%);
    }

    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 380px;
      position: relative;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .login-title {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      margin-top: 8px;
    }

    .error-msg {
      background: rgba(255,59,59,0.1);
      border: 1px solid rgba(255,59,59,0.2);
      color: var(--accent-red);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      margin-bottom: 16px;
    }

    /* RCON terminal */
    .rcon-input-area {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .rcon-input-area input {
      font-family: var(--font-mono);
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .grid-4 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 900px) {
      .grid-3, .grid-2 { grid-template-columns: 1fr; }
      .sidebar { width: 60px; min-width: 60px; }
      .sidebar .logo-text, .sidebar .logo-sub, .sidebar .nav-section-label,
      .sidebar .nav-item span, .sidebar .user-info, .sidebar .server-status-pill span,
      .sidebar .nav-badge { display: none; }
      .sidebar .nav-item { justify-content: center; padding: 12px; }
      .sidebar .sidebar-header { padding: 12px; display: flex; flex-direction: column; align-items: center; }
      .sidebar .sidebar-footer { justify-content: center; }
      .sidebar .user-avatar { margin: 0; }
      .form-row { grid-template-columns: 1fr; }
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.3s ease-out; }
    .fade-in-delay-1 { animation: fadeIn 0.3s ease-out 0.05s both; }
    .fade-in-delay-2 { animation: fadeIn 0.3s ease-out 0.1s both; }
    .fade-in-delay-3 { animation: fadeIn 0.3s ease-out 0.15s both; }
    .fade-in-delay-4 { animation: fadeIn 0.3s ease-out 0.2s both; }

    /* Quick actions grid */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .quick-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-display);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
    }

    .quick-action-btn:hover {
      border-color: var(--border-active);
      background: var(--bg-card);
      color: var(--text-primary);
      transform: translateY(-2px);
    }

    .quick-action-btn .icon {
      font-size: 22px;
      line-height: 1;
    }

    .quick-action-btn.start:hover { border-color: var(--accent-green); color: var(--accent-green); }
    .quick-action-btn.stop:hover { border-color: var(--accent-red); color: var(--accent-red); }
    .quick-action-btn.restart:hover { border-color: var(--accent-yellow); color: var(--accent-yellow); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { font-size: 13px; }

    /* Notification toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      min-width: 280px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease-out;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .toast.success { border-left: 3px solid var(--accent-green); }
    .toast.error { border-left: 3px solid var(--accent-red); }
    .toast.warning { border-left: 3px solid var(--accent-yellow); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* File editor */
    .file-tree {
      max-height: 400px;
      overflow-y: auto;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
    }

    .file-item:hover { background: var(--bg-elevated); }
    .file-item.dir { color: var(--accent-blue); font-weight: 500; }
    .file-item.file { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

    // ─── API Layer ─────────────────────────────────────────
    const API_URL = window.location.hostname === 'localhost' 
      ? 'http://localhost:3001' 
      : window.location.origin;

    class API {
      static token = localStorage.getItem('dayz_panel_token') || '';

      static setToken(t) { this.token = t; localStorage.setItem('dayz_panel_token', t); }
      static clearToken() { this.token = ''; localStorage.removeItem('dayz_panel_token'); }

      static async request(path, options = {}) {
        const res = await fetch(`${API_URL}${path}`, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...(this.token ? { Authorization: `Bearer ${this.token}` } : {}),
            ...options.headers,
          },
          body: options.body ? JSON.stringify(options.body) : undefined,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      static get(path) { return this.request(path); }
      static post(path, body) { return this.request(path, { method: 'POST', body }); }
      static patch(path, body) { return this.request(path, { method: 'PATCH', body }); }
      static del(path) { return this.request(path, { method: 'DELETE' }); }
    }

    // ─── Toast System ────────────────────────────────────
    const ToastContext = createContext();

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts(t => [...t, { id, message, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
      };
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type}`}>
                <span>{t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : '⚠️'}</span>
                <span>{t.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    function useToast() { return useContext(ToastContext); }

    // ─── Login Screen ────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          const data = await API.post('/api/auth/login', { username, password });
          API.setToken(data.token);
          onLogin(data.user);
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      return (
        <div className="login-screen">
          <div className="login-box fade-in">
            <div style={{ textAlign: 'center', marginBottom: '4px' }}>
              <div className="logo-icon" style={{ width: 48, height: 48, fontSize: 22, margin: '0 auto 16px', borderRadius: 12 }}>DZ</div>
            </div>
            <div className="login-title">DayZ Panel</div>
            <div className="login-subtitle">Server Control Dashboard</div>
            {error && <div className="error-msg">{error}</div>}
            <form onSubmit={handleSubmit}>
              <div className="form-group">
                <label>Username</label>
                <input type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder="admin" autoFocus />
              </div>
              <div className="form-group">
                <label>Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" />
              </div>
              <button type="submit" className="btn btn-primary login-btn" disabled={loading}>
                {loading ? 'Signing in...' : 'Sign In'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ─── Sidebar ─────────────────────────────────────────
    function Sidebar({ activePage, setActivePage, serverStatus, playerCount, user, onLogout }) {
      const statusClass = `status-${serverStatus}`;
      const pages = [
        { section: 'Overview', items: [
          { id: 'dashboard', icon: '📊', label: 'Dashboard' },
          { id: 'console', icon: '🖥️', label: 'Console' },
        ]},
        { section: 'Management', items: [
          { id: 'players', icon: '👥', label: 'Players', badge: playerCount },
          { id: 'mods', icon: '🧩', label: 'Mods' },
          { id: 'bans', icon: '🚫', label: 'Ban List' },
          { id: 'scheduler', icon: '⏰', label: 'Scheduler' },
        ]},
        { section: 'Configuration', items: [
          { id: 'config', icon: '⚙️', label: 'Server Config' },
          { id: 'files', icon: '📁', label: 'File Editor' },
          { id: 'logs', icon: '📋', label: 'Logs' },
        ]},
      ];

      return (
        <div className="sidebar">
          <div className="sidebar-header">
            <div className="sidebar-logo">
              <div className="logo-icon">DZ</div>
              <div>
                <div className="logo-text">DayZ Panel</div>
                <div className="logo-sub">v1.0.0</div>
              </div>
            </div>
            <div className={`server-status-pill ${statusClass}`}>
              <div className="status-dot" />
              <span>{serverStatus.toUpperCase()}</span>
            </div>
          </div>

          <div className="sidebar-nav">
            {pages.map(section => (
              <div className="nav-section" key={section.section}>
                <div className="nav-section-label">{section.section}</div>
                {section.items.map(item => (
                  <div
                    key={item.id}
                    className={`nav-item ${activePage === item.id ? 'active' : ''}`}
                    onClick={() => setActivePage(item.id)}
                  >
                    <span className="nav-icon">{item.icon}</span>
                    <span>{item.label}</span>
                    {item.badge > 0 && <span className="nav-badge">{item.badge}</span>}
                  </div>
                ))}
              </div>
            ))}
          </div>

          <div className="sidebar-footer">
            <div className="user-avatar">{(user?.username || 'A')[0].toUpperCase()}</div>
            <div className="user-info">
              <div className="user-name">{user?.username}</div>
              <div className="user-role">{user?.role}</div>
            </div>
            <button className="btn-icon" onClick={onLogout} title="Logout">⏻</button>
          </div>
        </div>
      );
    }

    // ─── Dashboard Page ──────────────────────────────────
    function DashboardPage({ serverStatus, players, metrics, onServerAction }) {
      const toast = useToast();

      const handleAction = async (action) => {
        try {
          if (action === 'start') await API.post('/api/server/start');
          else if (action === 'stop') await API.post('/api/server/stop');
          else if (action === 'restart') await API.post('/api/server/restart', { countdown: 60 });
          else if (action === 'lock') await API.post('/api/server/lock');
          else if (action === 'unlock') await API.post('/api/server/unlock');
          toast(`Server ${action} command sent`, 'success');
          onServerAction?.();
        } catch (err) {
          toast(err.message, 'error');
        }
      };

      const cpuData = metrics?.cpu?.slice(-30) || [];
      const ramData = metrics?.ram?.slice(-30) || [];
      const maxCpu = Math.max(...cpuData, 1);
      const maxRam = Math.max(...ramData, 1);
      const currentCpu = cpuData[cpuData.length - 1] || 0;
      const currentRam = ramData[ramData.length - 1] || 0;
      const currentFps = metrics?.fps?.slice(-1)[0] || 0;

      return (
        <div className="fade-in">
          {/* Stats Row */}
          <div className="grid grid-4 mb-24">
            <div className="stat-card green fade-in">
              <div className="stat-label">Server Status</div>
              <div className={`stat-value ${serverStatus === 'running' ? 'green' : serverStatus === 'stopped' ? '' : 'yellow'}`}>
                {serverStatus.toUpperCase()}
              </div>
            </div>
            <div className="stat-card blue fade-in-delay-1">
              <div className="stat-label">Players Online</div>
              <div className="stat-value blue">{players?.length || 0}</div>
              <div className="stat-sub">of 60 max</div>
            </div>
            <div className="stat-card yellow fade-in-delay-2">
              <div className="stat-label">CPU Usage</div>
              <div className="stat-value yellow">{currentCpu}%</div>
              <div className="stat-sub">Server process</div>
            </div>
            <div className="stat-card purple fade-in-delay-3">
              <div className="stat-label">Server FPS</div>
              <div className="stat-value purple">{currentFps}</div>
              <div className="stat-sub">Target: 60</div>
            </div>
          </div>

          {/* Quick Actions */}
          <div className="card mb-24 fade-in-delay-2">
            <div className="card-header">
              <div className="card-title">⚡ Quick Actions</div>
            </div>
            <div className="card-body">
              <div className="quick-actions">
                <div className="quick-action-btn start" onClick={() => handleAction('start')}>
                  <span className="icon">▶️</span>Start Server
                </div>
                <div className="quick-action-btn stop" onClick={() => handleAction('stop')}>
                  <span className="icon">⏹️</span>Stop Server
                </div>
                <div className="quick-action-btn restart" onClick={() => handleAction('restart')}>
                  <span className="icon">🔄</span>Restart (60s)
                </div>
                <div className="quick-action-btn" onClick={() => handleAction('lock')}>
                  <span className="icon">🔒</span>Lock Server
                </div>
                <div className="quick-action-btn" onClick={() => handleAction('unlock')}>
                  <span className="icon">🔓</span>Unlock Server
                </div>
              </div>
            </div>
          </div>

          {/* Charts */}
          <div className="grid grid-2 mb-24">
            <div className="card fade-in-delay-3">
              <div className="card-header">
                <div className="card-title">📈 CPU Usage</div>
                <span style={{ fontSize: 12, fontFamily: 'var(--font-mono)', color: 'var(--text-muted)' }}>Last 30 min</span>
              </div>
              <div className="card-body" style={{ padding: 0 }}>
                <div className="chart-area">
                  <div className="chart-bars">
                    {(cpuData.length > 0 ? cpuData : Array(30).fill(0)).map((v, i) => (
                      <div key={i} className="chart-bar" style={{
                        height: `${Math.max((v / 100) * 100, 2)}%`,
                        background: v > 80 ? 'var(--accent-red)' : v > 50 ? 'var(--accent-yellow)' : 'var(--accent-green)',
                      }} title={`${v}%`} />
                    ))}
                  </div>
                  <div className="chart-labels">
                    <span>30m ago</span><span>now</span>
                  </div>
                </div>
              </div>
            </div>
            <div className="card fade-in-delay-4">
              <div className="card-header">
                <div className="card-title">💾 RAM Usage</div>
                <span style={{ fontSize: 12, fontFamily: 'var(--font-mono)', color: 'var(--text-muted)' }}>Last 30 min</span>
              </div>
              <div className="card-body" style={{ padding: 0 }}>
                <div className="chart-area">
                  <div className="chart-bars">
                    {(ramData.length > 0 ? ramData : Array(30).fill(0)).map((v, i) => (
                      <div key={i} className="chart-bar" style={{
                        height: `${Math.max((v / 4096) * 100, 2)}%`,
                        background: 'var(--accent-blue)',
                      }} title={`${v}MB`} />
                    ))}
                  </div>
                  <div className="chart-labels">
                    <span>30m ago</span><span>now</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Recent Players */}
          <div className="card fade-in-delay-4">
            <div className="card-header">
              <div className="card-title">👥 Online Players</div>
              <span className="nav-badge">{players?.length || 0}</span>
            </div>
            {(!players || players.length === 0) ? (
              <div className="empty-state">
                <div className="icon">👤</div>
                <p>No players online</p>
              </div>
            ) : (
              <div className="table-container">
                <table>
                  <thead>
                    <tr><th>#</th><th>Name</th><th>Ping</th><th>Joined</th><th>Actions</th></tr>
                  </thead>
                  <tbody>
                    {players.map((p, i) => (
                      <tr key={p.id || i}>
                        <td style={{ fontFamily: 'var(--font-mono)', color: 'var(--text-muted)' }}>{i + 1}</td>
                        <td className="player-name">{p.name}</td>
                        <td><span className={`ping ${(p.ping||0) < 100 ? 'good' : (p.ping||0) < 200 ? 'medium' : 'bad'}`}>{p.ping || '?'}ms</span></td>
                        <td style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>{p.joinedAt ? new Date(p.joinedAt).toLocaleTimeString() : '--'}</td>
                        <td>
                          <button className="btn btn-ghost btn-sm" onClick={() => API.post(`/api/players/${p.id}/kick`, { reason: 'Kicked by admin' }).then(() => toast('Player kicked', 'success'))}>Kick</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Console Page ────────────────────────────────────
    function ConsolePage() {
      const [logs, setLogs] = useState([]);
      const [command, setCommand] = useState('');
      const [history, setHistory] = useState([]);
      const [histIdx, setHistIdx] = useState(-1);
      const consoleRef = useRef(null);
      const toast = useToast();

      useEffect(() => {
        API.get('/api/logs?limit=200').then(setLogs).catch(() => {});
      }, []);

      const sendCommand = async () => {
        if (!command.trim()) return;
        try {
          const result = await API.post('/api/server/rcon', { command });
          setHistory(h => [command, ...h]);
          setLogs(l => [{ timestamp: new Date().toISOString(), level: 'info', source: 'rcon', message: `> ${command}` }, ...l]);
          if (result.result) {
            setLogs(l => [{ timestamp: new Date().toISOString(), level: 'info', source: 'rcon', message: result.result }, ...l]);
          }
          setCommand('');
          setHistIdx(-1);
        } catch (err) {
          toast(err.message, 'error');
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') sendCommand();
        else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const next = Math.min(histIdx + 1, history.length - 1);
          setHistIdx(next);
          if (history[next]) setCommand(history[next]);
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          const next = Math.max(histIdx - 1, -1);
          setHistIdx(next);
          setCommand(next >= 0 ? history[next] : '');
        }
      };

      return (
        <div className="fade-in">
          <div className="card">
            <div className="card-header">
              <div className="card-title">🖥️ Server Console / RCON</div>
              <button className="btn btn-ghost btn-sm" onClick={() => API.get('/api/logs?limit=200').then(setLogs)}>Refresh</button>
            </div>
            <div className="card-body">
              <div className="console" ref={consoleRef}>
                {logs.length === 0 && <div style={{ color: 'var(--text-muted)', fontStyle: 'italic' }}>No log entries yet...</div>}
                {logs.map((log, i) => (
                  <div key={i} className="log-entry">
                    <span className="log-time">{new Date(log.timestamp).toLocaleTimeString()}</span>
                    <span className={`log-level ${log.level}`}>{log.level}</span>
                    <span className="log-source">[{log.source}]</span>
                    <span className="log-msg">{log.message}</span>
                  </div>
                ))}
              </div>
              <div className="rcon-input-area">
                <input
                  type="text"
                  value={command}
                  onChange={e => setCommand(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="Type RCON command... (e.g. #restart, kick 5, say -1 Hello)"
                  style={{ flex: 1 }}
                />
                <button className="btn btn-primary" onClick={sendCommand}>Send</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Players Page ────────────────────────────────────
    function PlayersPage({ players }) {
      const [message, setMessage] = useState('');
      const toast = useToast();

      const broadcast = async () => {
        if (!message.trim()) return;
        try {
          await API.post('/api/server/message', { message });
          toast('Message broadcast to all players', 'success');
          setMessage('');
        } catch (err) { toast(err.message, 'error'); }
      };

      const kickPlayer = async (id, name) => {
        if (!confirm(`Kick ${name}?`)) return;
        try {
          await API.post(`/api/players/${id}/kick`, { reason: 'Kicked by admin' });
          toast(`${name} kicked`, 'success');
        } catch (err) { toast(err.message, 'error'); }
      };

      const banPlayer = async (id, name) => {
        if (!confirm(`Ban ${name}? This will permanently remove them.`)) return;
        try {
          await API.post(`/api/players/${id}/ban`, { reason: 'Banned by admin' });
          toast(`${name} banned`, 'warning');
        } catch (err) { toast(err.message, 'error'); }
      };

      return (
        <div className="fade-in">
          {/* Broadcast */}
          <div className="card mb-24">
            <div className="card-header">
              <div className="card-title">📢 Broadcast Message</div>
            </div>
            <div className="card-body">
              <div className="input-group">
                <input type="text" value={message} onChange={e => setMessage(e.target.value)} placeholder="Type a message to all players..."
                  onKeyDown={e => e.key === 'Enter' && broadcast()} style={{ flex: 1 }} />
                <button className="btn btn-primary" onClick={broadcast}>Send</button>
              </div>
            </div>
          </div>

          {/* Player List */}
          <div className="card">
            <div className="card-header">
              <div className="card-title">👥 Online Players ({players?.length || 0})</div>
            </div>
            {(!players || players.length === 0) ? (
              <div className="empty-state">
                <div className="icon">🏜️</div>
                <p>No players currently on the server</p>
              </div>
            ) : (
              <div className="table-container">
                <table>
                  <thead>
                    <tr><th>#</th><th>Name</th><th>IP</th><th>Ping</th><th>Joined</th><th>Actions</th></tr>
                  </thead>
                  <tbody>
                    {players.map((p, i) => (
                      <tr key={p.id || i}>
                        <td style={{ fontFamily: 'var(--font-mono)', color: 'var(--text-muted)' }}>{i + 1}</td>
                        <td className="player-name">{p.name}</td>
                        <td style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>{p.ip || '127.0.0.1'}</td>
                        <td><span className={`ping ${(p.ping||0) < 100 ? 'good' : (p.ping||0) < 200 ? 'medium' : 'bad'}`}>{p.ping || '?'}ms</span></td>
                        <td style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>{p.joinedAt ? new Date(p.joinedAt).toLocaleTimeString() : '--'}</td>
                        <td style={{ display: 'flex', gap: 6 }}>
                          <button className="btn btn-ghost btn-sm" onClick={() => kickPlayer(p.id, p.name)}>👢 Kick</button>
                          <button className="btn btn-danger btn-sm" onClick={() => banPlayer(p.id, p.name)}>🚫 Ban</button>

    // ─── Mods Page ───────────────────────────────────────
    function ModsPage() {
      const [mods, setMods] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [activeTab, setActiveTab] = useState('installed'); // installed | search | popular
      const [popularMods, setPopularMods] = useState([]);
      const [loadingPopular, setLoadingPopular] = useState(false);
      const toast = useToast();
      const searchTimeout = useRef(null);

      useEffect(() => { API.get('/api/mods').then(setMods).catch(() => {}); }, []);

      // Debounced Workshop search
      const handleSearch = (query) => {
        setSearchQuery(query);
        if (searchTimeout.current) clearTimeout(searchTimeout.current);
        if (query.trim().length < 2) { setSearchResults([]); return; }
        searchTimeout.current = setTimeout(async () => {
          setSearching(true);
          try {
            const data = await API.get(`/api/workshop/search?q=${encodeURIComponent(query.trim())}`);
            setSearchResults(data.results || []);
          } catch (err) { toast('Workshop search failed', 'error'); }
          setSearching(false);
        }, 400);
      };

      // Load popular mods
      const loadPopular = async () => {
        if (popularMods.length > 0) return;
        setLoadingPopular(true);
        try {
          const data = await API.get('/api/workshop/popular');
          setPopularMods(data.results || []);
        } catch (err) { toast('Failed to load popular mods', 'error'); }
        setLoadingPopular(false);
      };

      const isInstalled = (workshopId) => mods.some(m => m.workshopId === workshopId);

      const addFromWorkshop = async (item) => {
        if (isInstalled(item.workshopId)) return;
        try {
          const mod = await API.post('/api/mods', { name: item.name, workshopId: item.workshopId });
          setMods(m => [...m, mod]);
          toast(`Added: ${item.name}`, 'success');
        } catch (err) { toast(err.message, 'error'); }
      };

      const toggleMod = async (mod) => {
        try {
          await API.patch(`/api/mods/${mod.workshopId}`, { enabled: !mod.enabled });
          setMods(ms => ms.map(m => m.workshopId === mod.workshopId ? { ...m, enabled: !m.enabled } : m));
        } catch (err) { toast(err.message, 'error'); }
      };

      const removeMod = async (mod) => {
        if (!confirm(`Remove ${mod.name}?`)) return;
        try {
          await API.del(`/api/mods/${mod.workshopId}`);
          setMods(ms => ms.filter(m => m.workshopId !== mod.workshopId));
          toast('Mod removed', 'success');
        } catch (err) { toast(err.message, 'error'); }
      };

      const formatSize = (bytes) => {
        if (!bytes) return '';
        if (bytes > 1024 * 1024 * 1024) return `${(bytes / (1024*1024*1024)).toFixed(1)} GB`;
        if (bytes > 1024 * 1024) return `${(bytes / (1024*1024)).toFixed(1)} MB`;
        return `${(bytes / 1024).toFixed(0)} KB`;
      };

      const formatSubs = (n) => {
        if (!n) return '0';
        if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M`;
        if (n >= 1000) return `${(n / 1000).toFixed(1)}K`;
        return String(n);
      };

      // Render a workshop result item
      const WorkshopItem = ({ item }) => {
        const installed = isInstalled(item.workshopId);
        return (
          <div className={`workshop-result-item${installed ? ' already-installed' : ''}`}>
            {item.preview ? (
              <img className="workshop-thumb" src={item.preview} alt="" onError={e => e.target.style.display='none'} />
            ) : (
              <div className="workshop-thumb" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '16px' }}>🧩</div>
            )}
            <div className="workshop-info">
              <div className="workshop-info-name">{item.name}</div>
              <div className="workshop-info-meta">
                <span>ID: {item.workshopId}</span>
                {item.subscribers > 0 && <span>⬇ {formatSubs(item.subscribers)}</span>}
                {item.fileSize > 0 && <span>📦 {formatSize(item.fileSize)}</span>}
                {item.updated && <span>🕐 {new Date(item.updated).toLocaleDateString()}</span>}
              </div>
            </div>
            <button
              className="workshop-add-btn"
              disabled={installed}
              onClick={() => addFromWorkshop(item)}
            >
              {installed ? '✓ Installed' : '+ Add'}
            </button>
          </div>
        );
      };

      return (
        <div className="fade-in">
          {/* Tab bar */}
          <div className="workshop-tabs">
            <div className={`workshop-tab${activeTab === 'installed' ? ' active' : ''}`} onClick={() => setActiveTab('installed')}>
              🧩 Installed ({mods.length})
            </div>
            <div className={`workshop-tab${activeTab === 'search' ? ' active' : ''}`} onClick={() => setActiveTab('search')}>
              🔍 Workshop Search
            </div>
            <div className={`workshop-tab${activeTab === 'popular' ? ' active' : ''}`} onClick={() => { setActiveTab('popular'); loadPopular(); }}>
              🔥 Popular
            </div>
          </div>

          {/* Search Tab */}
          {activeTab === 'search' && (
            <div className="card mb-24">
              <div className="card-header">
                <div className="card-title">🔍 Search Steam Workshop</div>
              </div>
              <div className="card-body">
                <div className="workshop-search-box">
                  <span className="workshop-search-icon">🔎</span>
                  <input
                    type="text"
                    placeholder="Search DayZ mods on Steam Workshop..."
                    value={searchQuery}
                    onChange={e => handleSearch(e.target.value)}
                    style={{ paddingLeft: '36px' }}
                    autoFocus
                  />
                </div>
                {searching && <div className="workshop-loading">Searching Steam Workshop...</div>}
                {!searching && searchResults.length > 0 && (
                  <div className="workshop-results">
                    {searchResults.map(item => <WorkshopItem key={item.workshopId} item={item} />)}
                  </div>
                )}
                {!searching && searchQuery.length >= 2 && searchResults.length === 0 && (
                  <div className="workshop-loading">No mods found for "{searchQuery}"</div>
                )}
                {!searching && searchQuery.length < 2 && (
                  <div className="workshop-loading">Type at least 2 characters to search the Workshop</div>
                )}
              </div>
            </div>
          )}

          {/* Popular Tab */}
          {activeTab === 'popular' && (
            <div className="card mb-24">
              <div className="card-header">
                <div className="card-title">🔥 Popular DayZ Mods (Last 30 Days)</div>
              </div>
              <div className="card-body">
                {loadingPopular && <div className="workshop-loading">Loading popular mods...</div>}
                {!loadingPopular && popularMods.length > 0 && (
                  <div className="workshop-results">
                    {popularMods.map(item => <WorkshopItem key={item.workshopId} item={item} />)}
                  </div>
                )}
                {!loadingPopular && popularMods.length === 0 && (
                  <div className="workshop-loading">No popular mods available — Steam API may require an API key for this feature.</div>
                )}
              </div>
            </div>
          )}

          {/* Installed Mods (always visible, or as tab) */}
          {activeTab === 'installed' && (
            <div className="card">
              <div className="card-header">
                <div className="card-title">🧩 Installed Mods ({mods.length})</div>
              </div>
              {mods.length === 0 ? (
                <div className="empty-state">
                  <div className="icon">🧩</div>
                  <p>No mods detected — check your server directory</p>
                </div>
              ) : (
                <div>
                  {mods.map((mod, i) => (
                    <div className="mod-item" key={mod.workshopId || mod.name}>
                      <span className="mod-order">#{i + 1}</span>
                      <label className="toggle">
                        <input type="checkbox" checked={mod.enabled} onChange={() => toggleMod(mod)} />
                        <span className="toggle-slider" />
                      </label>
                      <span className="mod-name" style={{ opacity: mod.enabled ? 1 : 0.4 }}>{mod.name}</span>
                      <a
                        href={mod.workshopId ? `https://steamcommunity.com/sharedfiles/filedetails/?id=${mod.workshopId}` : '#'}
                        target="_blank"
                        rel="noopener"
                        className="mod-id"
                        style={{ textDecoration: 'none', cursor: mod.workshopId ? 'pointer' : 'default' }}
                        title="Open on Steam Workshop"
                      >
                        {mod.workshopId || 'local'}
                      </a>
                      <button className="btn btn-ghost btn-sm" onClick={() => removeMod(mod)}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── Scheduler Page ──────────────────────────────────
    function SchedulerPage() {
      const [schedules, setSchedules] = useState([]);
      const [label, setLabel] = useState('');
      const [cron, setCron] = useState('0 */4 * * *');
      const toast = useToast();

      useEffect(() => { API.get('/api/schedule').then(setSchedules).catch(() => {}); }, []);

      const addSchedule = async () => {
        if (!label) return;
        try {
          const s = await API.post('/api/schedule', { cronExpression: cron, label, enabled: true });
          setSchedules(ss => [...ss, s]);
          setLabel(''); setCron('0 */4 * * *');
          toast('Restart scheduled', 'success');
        } catch (err) { toast(err.message, 'error'); }
      };

      const remove = async (id) => {
        try {
          await API.del(`/api/schedule/${id}`);
          setSchedules(ss => ss.filter(s => s.id !== id));
          toast('Schedule removed', 'success');
        } catch (err) { toast(err.message, 'error'); }
      };

      const presets = [
        { label: 'Every 4 hours', cron: '0 */4 * * *' },
        { label: 'Every 6 hours', cron: '0 */6 * * *' },
        { label: 'Every 12 hours', cron: '0 */12 * * *' },
        { label: 'Daily at 4 AM', cron: '0 4 * * *' },
        { label: 'Daily at midnight', cron: '0 0 * * *' },
      ];

      return (
        <div className="fade-in">
          <div className="card mb-24">
            <div className="card-header">
              <div className="card-title">➕ Schedule Restart</div>
            </div>
            <div className="card-body">
              <div className="form-row">
                <div className="form-group" style={{ marginBottom: 0 }}>
                  <label>Label</label>
                  <input type="text" value={label} onChange={e => setLabel(e.target.value)} placeholder="e.g. Regular 4h restart" />
                </div>
                <div className="form-group" style={{ marginBottom: 0 }}>
                  <label>Cron Expression</label>
                  <input type="text" value={cron} onChange={e => setCron(e.target.value)} placeholder="0 */4 * * *" style={{ fontFamily: 'var(--font-mono)' }} />
                </div>
              </div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 16 }}>
                {presets.map(p => (
                  <button key={p.cron} className="btn btn-ghost btn-sm" onClick={() => { setCron(p.cron); setLabel(p.label); }}>{p.label}</button>
                ))}
              </div>
              <button className="btn btn-primary" onClick={addSchedule}>Add Schedule</button>
            </div>
          </div>

          <div className="card">
            <div className="card-header">
              <div className="card-title">⏰ Scheduled Restarts</div>
            </div>
            {schedules.length === 0 ? (
              <div className="empty-state">
                <div className="icon">⏰</div>
                <p>No scheduled restarts configured</p>
              </div>
            ) : (
              <div className="table-container">
                <table>
                  <thead>
                    <tr><th>Label</th><th>Schedule</th><th>Status</th><th>Actions</th></tr>
                  </thead>
                  <tbody>
                    {schedules.map(s => (
                      <tr key={s.id}>
                        <td className="player-name">{s.label}</td>
                        <td style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>{s.cronExpression}</td>
                        <td><span style={{ color: s.enabled ? 'var(--accent-green)' : 'var(--text-muted)' }}>{s.enabled ? 'Active' : 'Disabled'}</span></td>
                        <td><button className="btn btn-ghost btn-sm" onClick={() => remove(s.id)}>Remove</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Config Page ─────────────────────────────────────
    function ConfigPage() {
      const [config, setConfig] = useState(null);
      const [dirty, setDirty] = useState(false);
      const toast = useToast();

      useEffect(() => { API.get('/api/config').then(setConfig).catch(() => {}); }, []);

      const updateField = (key, value) => {
        setConfig(c => ({ ...c, [key]: value }));
        setDirty(true);
      };

      const save = async () => {
        try {
          await API.patch('/api/config', config);
          toast('Configuration saved', 'success');
          setDirty(false);
        } catch (err) { toast(err.message, 'error'); }
      };

      if (!config) return <div className="empty-state"><p>Loading configuration...</p></div>;

      const fields = [
        { key: 'serverName', label: 'Server Name', type: 'text' },
        { key: 'maxPlayers', label: 'Max Players', type: 'number' },
        { key: 'password', label: 'Server Password', type: 'text' },
        { key: 'adminPassword', label: 'Admin Password', type: 'password' },
        { key: 'verifySignatures', label: 'Verify Signatures', type: 'number' },
        { key: 'forceSameBuild', label: 'Force Same Build', type: 'number' },
        { key: 'thirdPerson', label: 'Third Person (0/1)', type: 'number' },
        { key: 'crosshair', label: 'Crosshair (0/1)', type: 'number' },
        { key: 'respawnTime', label: 'Respawn Time (s)', type: 'number' },
        { key: 'timeAcceleration', label: 'Time Acceleration', type: 'number' },
        { key: 'nightTimeAcceleration', label: 'Night Acceleration', type: 'number' },
        { key: 'loginQueueConcurrentPlayers', label: 'Login Queue Concurrent', type: 'number' },
        { key: 'loginQueueMaxPlayers', label: 'Login Queue Max', type: 'number' },
      ];

      return (
        <div className="fade-in">
          <div className="card">
            <div className="card-header">
              <div className="card-title">⚙️ Server Configuration</div>
              <button className={`btn ${dirty ? 'btn-primary' : 'btn-ghost'}`} onClick={save}>
                {dirty ? '💾 Save Changes' : 'No changes'}
              </button>
            </div>
            <div className="card-body">
              {Array.from({ length: Math.ceil(fields.length / 2) }, (_, rowIdx) => (
                <div className="form-row" key={rowIdx}>
                  {fields.slice(rowIdx * 2, rowIdx * 2 + 2).map(f => (
                    <div className="form-group" key={f.key} style={{ marginBottom: 0 }}>
                      <label>{f.label}</label>
                      <input
                        type={f.type}
                        value={config[f.key] || ''}
                        onChange={e => updateField(f.key, f.type === 'number' ? parseInt(e.target.value) || 0 : e.target.value)}
                      />
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── Files Page ──────────────────────────────────────
    function FilesPage() {
      const [files, setFiles] = useState([]);
      const [currentDir, setCurrentDir] = useState('');
      const [fileContent, setFileContent] = useState(null);
      const [editingFile, setEditingFile] = useState('');
      const toast = useToast();

      const loadDir = async (dir) => {
        try {
          const data = await API.get(`/api/files?dir=${encodeURIComponent(dir)}`);
          setFiles(data);
          setCurrentDir(dir);
          setFileContent(null);
        } catch (err) { toast(err.message, 'error'); }
      };

      const openFile = async (filePath) => {
        try {
          const data = await API.get(`/api/files/read?file=${encodeURIComponent(filePath)}`);
          setFileContent(data.content);
          setEditingFile(filePath);
        } catch (err) { toast(err.message, 'error'); }
      };

      const saveFile = async () => {
        try {
          await API.request('/api/files/write', { method: 'PUT', body: { file: editingFile, content: fileContent } });
          toast('File saved (backup created)', 'success');
        } catch (err) { toast(err.message, 'error'); }
      };

      useEffect(() => { loadDir(''); }, []);

      return (
        <div className="fade-in">
          <div className="grid grid-2" style={{ gridTemplateColumns: '300px 1fr' }}>
            <div className="card">
              <div className="card-header">
                <div className="card-title">📁 Files</div>
                {currentDir && (
                  <button className="btn btn-ghost btn-sm" onClick={() => {
                    const parent = currentDir.split('/').slice(0, -1).join('/');
                    loadDir(parent);
                  }}>⬆ Up</button>
                )}
              </div>
              <div className="file-tree">
                {files.map(f => (
                  <div key={f.name} className={`file-item ${f.type}`}
                    onClick={() => f.type === 'directory' ? loadDir(f.path) : openFile(f.path)}>
                    <span>{f.type === 'directory' ? '📁' : '📄'}</span>
                    <span>{f.name}</span>
                  </div>
                ))}
                {files.length === 0 && <div className="empty-state"><p>Empty directory</p></div>}
              </div>
            </div>

            <div className="card">
              <div className="card-header">
                <div className="card-title">📝 {editingFile || 'Select a file'}</div>
                {fileContent !== null && <button className="btn btn-primary btn-sm" onClick={saveFile}>💾 Save</button>}
              </div>
              <div className="card-body">
                {fileContent !== null ? (
                  <textarea value={fileContent} onChange={e => setFileContent(e.target.value)} style={{ minHeight: 500 }} />
                ) : (
                  <div className="empty-state">
                    <div className="icon">📄</div>
                    <p>Select a file to edit</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── App Root ────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(null);
      const [activePage, setActivePage] = useState('dashboard');
      const [serverStatus, setServerStatus] = useState('stopped');
      const [players, setPlayers] = useState([]);
      const [metrics, setMetrics] = useState({ cpu: [], ram: [], fps: [], players: [], timestamps: [] });
      const [loading, setLoading] = useState(true);

      // Check existing auth
      useEffect(() => {
        if (API.token) {
          API.get('/api/server/status')
            .then(data => {
              setServerStatus(data.status);
              setPlayers(data.players);
              setUser({ username: 'admin', role: 'admin' }); // simplified
            })
            .catch(() => { API.clearToken(); })
            .finally(() => setLoading(false));
        } else {
          setLoading(false);
        }
      }, []);

      // Fetch data periodically
      useEffect(() => {
        if (!user) return;
        const interval = setInterval(async () => {
          try {
            const status = await API.get('/api/server/status');
            setServerStatus(status.status);
            setPlayers(status.players);
            const m = await API.get('/api/metrics');
            setMetrics(m);
          } catch { /* ignore */ }
        }, 15000);
        return () => clearInterval(interval);
      }, [user]);

      // WebSocket
      useEffect(() => {
        if (!user) return;
        try {
          const socket = io(API_URL);
          socket.on('serverStatus', setServerStatus);
          socket.on('players', setPlayers);
          socket.on('metrics', data => {
            setMetrics(prev => ({
              cpu: [...prev.cpu.slice(-59), data.cpu],
              ram: [...prev.ram.slice(-59), data.ram],
              fps: [...prev.fps.slice(-59), data.fps],
              players: [...prev.players.slice(-59), data.players],
              timestamps: [...prev.timestamps.slice(-59), data.timestamp],
            }));
          });
          return () => socket.disconnect();
        } catch { /* socket.io not connected */ }
      }, [user]);

      const handleLogout = () => {
        API.clearToken();
        setUser(null);
      };

      if (loading) return null;
      if (!user) return <LoginScreen onLogin={setUser} />;

      const pageComponents = {
        dashboard: <DashboardPage serverStatus={serverStatus} players={players} metrics={metrics} />,
        console: <ConsolePage />,
        players: <PlayersPage players={players} />,
        mods: <ModsPage />,
        bans: <BansPage />,
        scheduler: <SchedulerPage />,
        config: <ConfigPage />,
        files: <FilesPage />,
        logs: <LogsPage />,
      };

      const pageTitles = {
        dashboard: 'Dashboard',
        console: 'Server Console',
        players: 'Player Management',
        mods: 'Mod Manager',
        bans: 'Ban List',
        scheduler: 'Restart Scheduler',
        config: 'Server Configuration',
        files: 'File Editor',
        logs: 'Server Logs',
      };

      return (
        <ToastProvider>
          <div className="app">
            <Sidebar
              activePage={activePage}
              setActivePage={setActivePage}
              serverStatus={serverStatus}
              playerCount={players.length}
              user={user}
              onLogout={handleLogout}
            />
            <div className="main">
              <div className="topbar">
                <div className="topbar-title">{pageTitles[activePage]}</div>
                <div className="topbar-actions">
                  <button className="btn-icon" title="Refresh" onClick={() => window.location.reload()}>⟳</button>
                </div>
              </div>
              <div className="content">
                {pageComponents[activePage]}
              </div>
            </div>
          </div>
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
