      const [expandedDirs, setExpandedDirs] = useState(new Set());
      const [loadingDirs, setLoadingDirs] = useState(new Set());

      // Tabs & editor
      const [tabs, setTabs] = useState([]);
      const [activeTab, setActiveTab] = useState(null);
      const [monacoLoaded, setMonacoLoaded] = useState(!!window.monaco);
      const [searchTerm, setSearchTerm] = useState('');
      const [cursorPos, setCursorPos] = useState({ line: 1, col: 1 });

      const editorRef = useRef(null);
      const containerRef = useRef(null);
      const modelsRef = useRef({});
      const tabsRef = useRef(tabs);
      const activeTabRef = useRef(activeTab);
      tabsRef.current = tabs;
      activeTabRef.current = activeTab;

      // ── Helpers ──
      const getLanguage = (filename) => {
        const ext = (filename || '').split('.').pop().toLowerCase();
        return { js: 'javascript', json: 'json', xml: 'xml', html: 'html', css: 'css',
          cfg: 'ini', ini: 'ini', bat: 'bat', cmd: 'bat', ps1: 'powershell',
          c: 'c', cpp: 'cpp', h: 'c', hpp: 'cpp', py: 'python', sh: 'shell',
          md: 'markdown', txt: 'plaintext', log: 'plaintext', csv: 'plaintext',
          yaml: 'yaml', yml: 'yaml', sql: 'sql', types: 'xml' }[ext] || 'plaintext';
      };

      const getFileIcon = (filename, isDir, isExpanded) => {
        if (isDir) return isExpanded ? '📂' : '📁';
        const ext = (filename || '').split('.').pop().toLowerCase();
        return { cfg: '⚙️', xml: '📋', json: '📊', bat: '⚡', cmd: '⚡',
          c: '💻', cpp: '💻', h: '📎', hpp: '📎', log: '📃', txt: '📝',
          md: '📝', js: '📜', py: '🐍', html: '🌐', css: '🎨' }[ext] || '📄';
      };

      const formatSize = (bytes) => {
        if (!bytes || bytes <= 0) return '';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      };

      // ── Directory loading with cache ──
      const loadDir = useCallback(async (dirPath) => {
        setLoadingDirs(prev => new Set(prev).add(dirPath));
        try {
          const data = await API.get(`/api/servers/${serverId}/files?dir=${encodeURIComponent(dirPath)}`);
          setTree(prev => ({ ...prev, [dirPath]: Array.isArray(data) ? data : [] }));
          return data;
        } catch (err) {
          window.addToast(err.message, 'error');
          return [];
        } finally {
          setLoadingDirs(prev => { const s = new Set(prev); s.delete(dirPath); return s; });
        }
      }, [serverId]);

      const toggleDir = useCallback(async (dirPath) => {
        const newExp = new Set(expandedDirs);
        if (newExp.has(dirPath)) {
          newExp.delete(dirPath);
        } else {
          newExp.add(dirPath);
          if (!tree[dirPath]) await loadDir(dirPath);
        }
        setExpandedDirs(newExp);
      }, [expandedDirs, tree, loadDir]);

      const refreshTree = useCallback(() => {
        setTree({});
        loadDir('');
      }, [loadDir]);

      // ── Tab management ──
      const openFile = useCallback(async (entry) => {
        if (tabs.find(t => t.path === entry.path)) {
          setActiveTab(entry.path);
          return;
        }
        try {
          const data = await API.get(`/api/servers/${serverId}/files/read?file=${encodeURIComponent(entry.path)}`);
          if (data.error) { window.addToast(data.error, 'error'); return; }
          const newTab = {
            path: entry.path,
            name: entry.name,
            content: data.content,
            originalContent: data.content,
            language: getLanguage(entry.name),
            size: data.size || 0,
          };
          setTabs(prev => [...prev, newTab]);
          setActiveTab(entry.path);
        } catch (err) {
          window.addToast(err.message, 'error');
        }
      }, [tabs, serverId]);

      const closeTab = useCallback((e, tabPath) => {
        e.stopPropagation();
        if (modelsRef.current[tabPath]) {
          modelsRef.current[tabPath].disposable.dispose();
          modelsRef.current[tabPath].model.dispose();
          delete modelsRef.current[tabPath];
        }
        setTabs(prev => {
          const newTabs = prev.filter(t => t.path !== tabPath);
          if (activeTabRef.current === tabPath) {
            const idx = prev.findIndex(t => t.path === tabPath);
            const next = newTabs[Math.min(idx, newTabs.length - 1)];
            setActiveTab(next ? next.path : null);
          }
          return newTabs;
        });
      }, []);

      const saveFile = useCallback(async () => {
        const currentPath = activeTabRef.current;
        const tab = tabsRef.current.find(t => t.path === currentPath);
        if (!tab) return;
        const content = editorRef.current ? editorRef.current.getValue() : tab.content;
        try {
          await API.put(`/api/servers/${serverId}/files/write`, { file: tab.path, content });
          setTabs(prev => prev.map(t => t.path === tab.path ? { ...t, content, originalContent: content } : t));
          if (modelsRef.current[tab.path]) {
            modelsRef.current[tab.path].savedContent = content;
          }
          window.addToast('File saved (backup created)', 'success');
        } catch (err) {
          window.addToast(err.message, 'error');
        }
      }, [serverId]);

      // ── Initialize ──
      useEffect(() => {
        loadDir('');
        setExpandedDirs(new Set(['']));
      }, [loadDir]);

      // ── Load Monaco editor ──
      useEffect(() => {
        if (window.monaco) { setMonacoLoaded(true); return; }
        const checkMonaco = setInterval(() => {
          if (window.monaco) { setMonacoLoaded(true); clearInterval(checkMonaco); }
        }, 200);
        return () => clearInterval(checkMonaco);
      }, []);

      // ── Configure Monaco theme ──
      useEffect(() => {
        if (!monacoLoaded) return;
        monaco.editor.defineTheme('dayz-dark', {
          base: 'vs-dark', inherit: true, rules: [],
          colors: {
            'editor.background': '#1b1e24',
            'editor.lineHighlightBackground': '#252830',
            'editorLineNumber.foreground': '#5a6170',
            'editorLineNumber.activeForeground': '#c6c6c6',
          }
        });
        monaco.editor.setTheme('dayz-dark');
      }, [monacoLoaded]);

      // ── Monaco editor lifecycle ──
      useEffect(() => {
        if (!monacoLoaded || !containerRef.current) return;
        const tab = tabs.find(t => t.path === activeTab);
        if (!tab) {
          if (editorRef.current) editorRef.current.setModel(null);
          return;
        }
        if (!editorRef.current) {
          editorRef.current = monaco.editor.create(containerRef.current, {
            theme: 'dayz-dark', automaticLayout: true,
            minimap: { enabled: true, scale: 1 }, fontSize: 14,
            fontFamily: "'JetBrains Mono', monospace", fontLigatures: true,
            lineNumbers: 'on', renderWhitespace: 'selection',
            bracketPairColorization: { enabled: true }, smoothScrolling: true,
            cursorBlinking: 'smooth', cursorSmoothCaretAnimation: 'on',
            padding: { top: 8 }, scrollBeyondLastLine: false,
            wordWrap: 'off', tabSize: 2,
            suggest: { showWords: false }, quickSuggestions: false,
          });
          editorRef.current.addCommand(
            monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
            () => saveFile()
          );
          editorRef.current.onDidChangeCursorPosition((e) => {
            setCursorPos({ line: e.position.lineNumber, col: e.position.column });
          });
        }
        const uri = monaco.Uri.parse('inmemory://model/' + tab.path);
        let model = monaco.editor.getModel(uri);
        if (!model) {
          model = monaco.editor.createModel(tab.content || '', tab.language, uri);
          const disposable = model.onDidChangeContent(() => {
            const val = model.getValue();
            setTabs(prev => prev.map(t => t.path === tab.path ? { ...t, content: val } : t));
          });
          modelsRef.current[tab.path] = { model, disposable, savedContent: tab.originalContent };
        }
        editorRef.current.setModel(model);
        editorRef.current.focus();
      }, [monacoLoaded, activeTab, tabs.length]);

      // Cleanup on unmount
      useEffect(() => {
        return () => {
          if (editorRef.current) { editorRef.current.dispose(); editorRef.current = null; }
          Object.values(modelsRef.current).forEach(m => {
            m.disposable.dispose();
            m.model.dispose();
          });
          modelsRef.current = {};
        };
      }, []);

      // ── Render tree recursively ──
      const renderTree = (dirPath, depth) => {
        const entries = tree[dirPath];
        if (!entries) return null;
        const filtered = searchTerm
          ? entries.filter(e => e.name.toLowerCase().includes(searchTerm.toLowerCase()) || e.type === 'directory')
          : entries;
        return filtered.map(entry => {
          const isDir = entry.type === 'directory';
          const isExp = expandedDirs.has(entry.path);
          const isActive = activeTab === entry.path;
          return (
            <React.Fragment key={entry.path}>
              <div
                className={`tree-node ${isActive ? 'selected' : ''}`}
                style={{ paddingLeft: 8 + depth * 16 }}
                onClick={() => isDir ? toggleDir(entry.path) : openFile(entry)}
                title={isDir ? entry.path : `${entry.path} — ${formatSize(entry.size)}`}
              >
                <span className="tree-arrow">
                  {isDir ? (loadingDirs.has(entry.path) ? '⟳' : (isExp ? '▾' : '▸')) : '\u00A0'}
                </span>
                <span className="tree-icon">{getFileIcon(entry.name, isDir, isExp)}</span>
                <span className="tree-name">{entry.name}</span>
              </div>
              {isDir && isExp && renderTree(entry.path, depth + 1)}
            </React.Fragment>
          );
        });
      };

      const currentTab = tabs.find(t => t.path === activeTab);
      const breadcrumb = currentTab ? currentTab.path.split('/') : [];

      return (
        <div className="fade-in">
          <div className="file-explorer">
            {/* ── Sidebar ── */}
            <div className="file-sidebar">
              <div className="file-sidebar-header">
                <span>Explorer</span>
                <button className="btn btn-ghost btn-sm" onClick={refreshTree} title="Refresh" style={{ padding: '2px 6px', fontSize: 12 }}>🔄</button>
              </div>
              <div className="file-search">
                <input type="text" placeholder="Filter files..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
              </div>
              <div className="file-sidebar-tree">
                {renderTree('', 0)}
                {loadingDirs.has('') && <div style={{ padding: '12px 16px', color: 'var(--text-muted)', fontSize: 12 }}>Loading file tree...</div>}
              </div>
            </div>

            {/* ── Editor Panel ── */}
            <div className="file-editor-panel">
              {tabs.length > 0 && (
                <div className="editor-tabs">
                  {tabs.map(tab => (
                    <div key={tab.path} className={`editor-tab ${activeTab === tab.path ? 'active' : ''}`} onClick={() => setActiveTab(tab.path)}>
                      <span style={{ fontSize: 12 }}>{getFileIcon(tab.name)}</span>
                      <span>{tab.name}</span>
                      {tab.content !== tab.originalContent && <span className="tab-dot"></span>}
                      <span className="tab-close" onClick={e => closeTab(e, tab.path)}>×</span>
                    </div>
                  ))}
                </div>
              )}

              {currentTab && (
                <div className="editor-breadcrumb">
                  {breadcrumb.map((part, i) => (
                    <React.Fragment key={i}>
                      {i > 0 && <span className="sep">›</span>}
                      <span>{part}</span>
                    </React.Fragment>
                  ))}
                </div>
              )}

              <div className="editor-container" ref={containerRef} style={{ display: currentTab ? 'block' : 'none' }}></div>

              {currentTab && (
                <div className="editor-status-bar">
                  <div className="status-left">
                    <span>{currentTab.language.toUpperCase()}</span>
                    <span>Ln {cursorPos.line}, Col {cursorPos.col}</span>
                    {currentTab.content !== currentTab.originalContent && (
                      <span style={{ color: '#ffd700' }}>● Modified</span>
                    )}
                  </div>
                  <div className="status-right">
                    <span>{formatSize(currentTab.size) || ''}</span>
                    <span style={{ cursor: 'pointer' }} onClick={saveFile}>💾 Save (Ctrl+S)</span>
                  </div>
                </div>
              )}

              {!currentTab && (
                <div className="editor-empty">
                  <div className="icon">📝</div>
                  <p>Select a file to edit</p>
                  <div className="shortcuts">
                    <span>Browse files in the explorer sidebar</span>
                    <span>Use the filter to quickly find files</span>
                    <span><kbd>Ctrl+S</kbd> to save changes</span>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── CONFIG ──────────────────────────────────────────
    function ConfigPage({ serverId }) {
      const [config, setConfig] = useState({});
      const [saving, setSaving] = useState(false);
      useEffect(() => { API.get(`/api/servers/${serverId}/config`).then(setConfig); }, [serverId]);
      const update = (key, value) => setConfig(c => ({ ...c, [key]: value }));
      const save = async () => {
        setSaving(true);
        await API.patch(`/api/servers/${serverId}/config`, config);
        window.addToast('Config saved', 'success');
        setSaving(false);
      };
      const fields = [
        { key: 'hostname', label: 'Server Name', type: 'text' },
        { key: 'maxPlayers', label: 'Max Players', type: 'number' },
        { key: 'password', label: 'Server Password', type: 'text' },
        { key: 'passwordAdmin', label: 'Admin Password', type: 'text' },
        { key: 'verifySignatures', label: 'Verify Signatures', type: 'number' },
        { key: 'forceSameBuild', label: 'Force Same Build', type: 'number' },
        { key: 'disableThirdPerson', label: 'Disable 3rd Person', type: 'number' },
        { key: 'serverTime', label: 'Server Time', type: 'text' },
        { key: 'serverTimeAcceleration', label: 'Time Acceleration', type: 'number' },
        { key: 'respawnTime', label: 'Respawn Time', type: 'number' },
        { key: 'loginQueueMaxPlayers', label: 'Login Queue Max', type: 'number' },
        { key: 'template', label: 'Map Template', type: 'text' },
      ];
      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 20 }}>
            <div className="card-title">serverDZ.cfg Editor</div>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? 'Saving...' : '💾 Save Config'}</button>
          </div>
          <div className="grid grid-2">
            {fields.map(f => (
              <div key={f.key} className="input-group">
                <label className="input-label">{f.label}</label>
                <input className="input" type={f.type} value={config[f.key] ?? ''} onChange={e => update(f.key, f.type === 'number' ? parseInt(e.target.value) || 0 : e.target.value)} />
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── BANS ────────────────────────────────────────────
    function BansPage({ serverId }) {
      const [bans, setBans] = useState([]);
      useEffect(() => { API.get(`/api/servers/${serverId}/bans`).then(setBans); }, [serverId]);
      const unban = async (id) => {
        await API.del(`/api/servers/${serverId}/bans/${id}`);
        setBans(b => b.filter(x => x.id !== id));
        window.addToast('Ban removed', 'success');
      };
      return (
        <div>
          {bans.length === 0 ? <div className="empty-state"><div className="empty-icon">🛡️</div><div className="empty-title">No Active Bans</div></div> : (
            <div className="table-wrap"><table>
              <thead><tr><th>Name</th><th>ID</th><th>Reason</th><th>Date</th><th>Actions</th></tr></thead>
              <tbody>{bans.map(b => (
                <tr key={b.id}><td>{b.name}</td><td style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>{b.id}</td><td>{b.reason}</td><td>{timeAgo(b.bannedAt)}</td>
                  <td><button className="btn btn-sm btn-secondary" onClick={() => unban(b.id)}>Unban</button></td></tr>
              ))}</tbody>
            </table></div>
          )}
        </div>
      );
    }

    // ─── SCHEDULER ───────────────────────────────────────
    function SchedulerPage({ serverId }) {
      const [tasks, setTasks] = useState([]);
      const [cron, setCron] = useState('');
      const [label, setLabel] = useState('');
      useEffect(() => { API.get(`/api/servers/${serverId}/schedule`).then(setTasks); }, [serverId]);
      const add = async () => {
        if (!label) return;
        const t = await API.post(`/api/servers/${serverId}/schedule`, { cronExpression: cron, label, enabled: true });
        setTasks(ts => [...ts, t]);
        setCron(''); setLabel('');
        window.addToast('Task added', 'success');
      };
      const remove = async (id) => {
        await API.del(`/api/servers/${serverId}/schedule/${id}`);
        setTasks(ts => ts.filter(t => t.id !== id));
      };
      return (
        <div>
          <div className="card" style={{ marginBottom: 20 }}>
            <div className="card-title" style={{ marginBottom: 12 }}>Add Scheduled Task</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <input className="input" placeholder="Label (e.g. Daily Restart)" value={label} onChange={e => setLabel(e.target.value)} style={{ flex: 1 }} />
              <input className="input" placeholder="Cron (e.g. 0 4 * * *)" value={cron} onChange={e => setCron(e.target.value)} style={{ width: 180 }} />
              <button className="btn btn-primary" onClick={add}>Add</button>
            </div>
          </div>
          {tasks.length === 0 ? <div className="empty-state"><div className="empty-icon">📅</div><div className="empty-title">No Scheduled Tasks</div></div> : (
            <div className="table-wrap"><table>
              <thead><tr><th>Label</th><th>Cron</th><th>Enabled</th><th>Actions</th></tr></thead>
              <tbody>{tasks.map(t => (
                <tr key={t.id}><td>{t.label}</td><td style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>{t.cronExpression}</td>
                  <td>{t.enabled ? '✅' : '❌'}</td>
                  <td><button className="btn btn-sm btn-danger" onClick={() => remove(t.id)}>Remove</button></td></tr>
              ))}</tbody>
            </table></div>
          )}
        </div>
      );
    }

    // ─── LOGS ────────────────────────────────────────────
    function LogsPage({ serverId }) {
      const [logs, setLogs] = useState([]);
      const [filter, setFilter] = useState('all');
      useEffect(() => { API.get(`/api/servers/${serverId}/logs?limit=500`).then(setLogs); }, [serverId]);
      const filtered = filter === 'all' ? logs : logs.filter(l => l.level === filter);
      return (
        <div>
          <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
            {['all', 'info', 'warn', 'error'].map(f => (
              <button key={f} className={`btn btn-sm ${filter === f ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setFilter(f)}>{f.toUpperCase()}</button>
            ))}
          </div>
          <div className="console-wrap" style={{ height: 'calc(100vh - 260px)' }}>
            <div className="console-output">
              {[...filtered].reverse().map((log, i) => (
                <div key={i} className={`console-line ${log.level || ''}`}>
                  <span className="console-time">{new Date(log.timestamp).toLocaleTimeString()}</span>
                  <span>[{log.source}]</span> {log.message}
                </div>
              ))}
            </div>
          </div>
        </div>

    // ─── USERS PAGE ──────────────────────────────────────
    function UsersPage() {
      const [tab, setTab] = useState('users');
      const [users, setUsers] = useState([]);
      const [roles, setRoles] = useState([]);
      const [audit, setAudit] = useState([]);
      const [showAddUser, setShowAddUser] = useState(false);
      const [showAddRole, setShowAddRole] = useState(false);
      const [newUser, setNewUser] = useState({ username: '', password: '', role: 'viewer', description: '' });
      const [newRole, setNewRole] = useState({ name: '', color: '#8b919a', permissions: [] });

      useEffect(() => { API.get('/api/users').then(setUsers); API.get('/api/roles').then(setRoles); }, []);
      useEffect(() => { if (tab === 'audit') API.get('/api/audit?limit=200').then(d => setAudit(d.entries || [])); }, [tab]);

      const addUser = async () => {
        if (!newUser.username || !newUser.password) return;
        const u = await API.post('/api/users', newUser);
        if (u.error) { window.addToast(u.error, 'error'); return; }
        setUsers(us => [...us, u]); setShowAddUser(false);
        setNewUser({ username: '', password: '', role: 'viewer', description: '' });
        window.addToast('User created', 'success');
      };

      const deleteUser = async (id) => {
        await API.del(`/api/users/${id}`);
        setUsers(us => us.filter(u => u.id !== id));
        window.addToast('User deleted', 'success');
      };

      const addRole = async () => {
        if (!newRole.name) return;
        const r = await API.post('/api/roles', newRole);
        if (r.error) { window.addToast(r.error, 'error'); return; }
        setRoles(rs => [...rs, r]); setShowAddRole(false);
        setNewRole({ name: '', color: '#8b919a', permissions: [] });
        window.addToast('Role created', 'success');
      };

      const deleteRole = async (id) => {
        await API.del(`/api/roles/${id}`);
        setRoles(rs => rs.filter(r => r.id !== id));
        window.addToast('Role deleted', 'success');
      };

      const allPermissions = ['server.view','server.start','server.stop','server.restart','server.rcon','server.config','server.deploy','players.view','players.kick','players.ban','mods.view','mods.install','files.browse','files.edit','logs.view','metrics.view','chat.send','users.manage','webhooks.manage'];

      };

        <div>
          <div className="tabs">
            <div className={`tab ${tab === 'users' ? 'active' : ''}`} onClick={() => setTab('users')}>Users</div>
            <div className={`tab ${tab === 'roles' ? 'active' : ''}`} onClick={() => setTab('roles')}>Roles</div>
            <div className={`tab ${tab === 'audit' ? 'active' : ''}`} onClick={() => setTab('audit')}>Audit Log</div>
          </div>

          {tab === 'users' && (
            <div>
              <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 16 }}>
                <button className="btn btn-primary" onClick={() => setShowAddUser(true)}>+ Add User</button>
              </div>
              <div className="table-wrap"><table>
                <thead><tr><th>Username</th><th>Role</th><th>Created</th><th>Actions</th></tr></thead>
                <tbody>{users.map(u => {
                  const role = roles.find(r => r.id === u.role);
                  return (
                    <tr key={u.id}>
                      <td><div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--bg-elevated)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 600, color: role?.color || 'var(--text-muted)' }}>{u.username[0]?.toUpperCase()}</div>
                        <div><div style={{ fontWeight: 600 }}>{u.username}</div>{u.isRoot && <div style={{ fontSize: 10, color: 'var(--accent-red)' }}>Root User</div>}{u.description && <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>{u.description}</div>}</div>
                      </div></td>
                      <td><span className="role-badge" style={{ background: (role?.color || '#8b919a') + '20', color: role?.color || '#8b919a' }}>{role?.name || u.role}</span></td>
                      <td style={{ fontSize: 12, color: 'var(--text-muted)' }}>{timeAgo(u.createdAt)}</td>
                      <td>{!u.isRoot && <button className="btn btn-sm btn-danger" onClick={() => deleteUser(u.id)}>Delete</button>}</td>
                    </tr>
                  );
                })}</tbody>
              </table></div>

              {showAddUser && (
                <div className="modal-overlay" onClick={() => setShowAddUser(false)}>
                  <div className="modal" onClick={e => e.stopPropagation()}>
                    <div className="modal-title">Add New User</div>
                    <div className="input-group"><label className="input-label">Username</label><input className="input" value={newUser.username} onChange={e => setNewUser({ ...newUser, username: e.target.value })} /></div>
                    <div className="input-group"><label className="input-label">Password</label><input className="input" type="password" value={newUser.password} onChange={e => setNewUser({ ...newUser, password: e.target.value })} /></div>
                    <div className="input-group"><label className="input-label">Role</label><select className="input" value={newUser.role} onChange={e => setNewUser({ ...newUser, role: e.target.value })}>{roles.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select></div>
                    <div className="input-group"><label className="input-label">Description</label><input className="input" value={newUser.description} onChange={e => setNewUser({ ...newUser, description: e.target.value })} /></div>
                    <div className="btn-group"><button className="btn btn-primary" onClick={addUser}>Create User</button><button className="btn btn-secondary" onClick={() => setShowAddUser(false)}>Cancel</button></div>
                  </div>

    // ─── WEBHOOKS PAGE ───────────────────────────────────
    function WebhooksPage() {
      const [webhooks, setWebhooks] = useState([]);
      const [tab, setTab] = useState('webhooks');
      const [showAdd, setShowAdd] = useState(false);
      const [selectedWh, setSelectedWh] = useState(null);
      const [deliveries, setDeliveries] = useState([]);
      const [newWh, setNewWh] = useState({ event: 'server.started', url: '', template: '', retryEnabled: true });

      useEffect(() => { API.get('/api/webhooks').then(setWebhooks); }, []);

      // Expanded event types
      const events = [
        'server.started', 'server.stopped', 'server.crashed', 'server.restarted',
        'server.health', 'player.kick', 'player.ban', 'mod.installed', 'mod.removed'
      ];
      const eventIcons = {
        'server.started': '🟢', 'server.stopped': '🔴', 'server.crashed': '💥', 'server.restarted': '🔄',
        'server.health': '⚠️', 'player.kick': '🦶', 'player.ban': '🔨', 'mod.installed': '📦', 'mod.removed': '🗑️'
      };
      const eventColor = (e) => {
        if (e === 'server.started') return 'started';
        if (e === 'server.stopped') return 'stopped';
        if (e === 'server.crashed') return 'crashed';
        if (e === 'server.restarted') return 'restarted';
        if (e === 'server.health') return 'health';
        if (e === 'player.kick') return 'kick';
        if (e === 'player.ban') return 'ban';
        if (e === 'mod.installed') return 'mod';
        if (e === 'mod.removed') return 'mod';
        return '';
      };

      const addWebhook = async () => {
        if (!newWh.url) return;
        const wh = await API.post('/api/webhooks', newWh);
        if (wh.error) { window.addToast(wh.error, 'error'); return; }
        setWebhooks(ws => [...ws, wh]); setShowAdd(false);
        setNewWh({ event: 'server.started', url: '', template: '', retryEnabled: true });
        window.addToast('Webhook created', 'success');
      };

      const deleteWebhook = async (id) => {
        await API.del(`/api/webhooks/${id}`);
        setWebhooks(ws => ws.filter(w => w.id !== id));
        window.addToast('Webhook deleted', 'success');
      };

      const testWebhook = async (id) => {
        const r = await API.post(`/api/webhooks/${id}/test`);
        window.addToast(r.message || 'Test sent', 'success');
      };

      const toggleWebhook = async (id, enabled) => {
        await API.patch(`/api/webhooks/${id}`, { enabled: !enabled });
        setWebhooks(ws => ws.map(w => w.id === id ? { ...w, enabled: !enabled } : w));
      };

      const viewDeliveries = async (wh) => {
        setSelectedWh(wh);
        const d = await API.get(`/api/webhooks/${wh.id}/deliveries`);
        setDeliveries(d);
        setTab('deliveries');
      };

      return (
        <div>
          <div className="tabs">
            <div className={`tab ${tab === 'webhooks' ? 'active' : ''}`} onClick={() => setTab('webhooks')}>WebHooks</div>
            <div className={`tab ${tab === 'deliveries' ? 'active' : ''}`} onClick={() => setTab('deliveries')}>Deliveries {selectedWh && `(${selectedWh.event})`}</div>
          </div>

          {tab === 'webhooks' && (
            <div>
              <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 16 }}>
                <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ Add Webhook</button>
              </div>
              {webhooks.length === 0 ? <div className="empty-state"><div className="empty-icon">🔗</div><div className="empty-title">No Webhooks</div><p>Add webhooks to receive notifications for server events.</p></div> : (
                <div className="webhook-list">
                  {webhooks.map(wh => (
                    <div key={wh.id} className="webhook-card">
                      <div className="webhook-card-header">
                        <span className={`webhook-event-badge ${eventColor(wh.event)}`}>{eventIcons[wh.event] || '🔗'} {wh.event}</span>
                        <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, maxWidth: 250, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={wh.url}>{wh.isDiscord ? '🟣 Discord' : wh.url}</div>
                      </div>
                      <div className="webhook-card-body">
                        <span style={{ fontSize: 12, color: 'var(--text-muted)', marginRight: 12 }}>{wh.retryEnabled ? 'Retry: On' : 'Retry: Off'}</span>
                        <span className={`toggle ${wh.enabled ? 'on' : ''}`} onClick={() => toggleWebhook(wh.id, wh.enabled)}><div className="toggle-knob" /></span>
                      </div>
                      <div className="webhook-card-actions">
                        <button className="btn btn-sm btn-secondary" onClick={() => testWebhook(wh.id)}>Test</button>
                        <button className="btn btn-sm btn-secondary" onClick={() => viewDeliveries(wh)}>History</button>
                        <button className="btn btn-sm btn-danger" onClick={() => deleteWebhook(wh.id)}>Delete</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {showAdd && (
                <div className="modal-overlay" onClick={() => setShowAdd(false)}>
                  <div className="modal modal-lg" onClick={e => e.stopPropagation()}>
                    <div className="modal-title">Add Webhook</div>
                    <div className="input-group"><label className="input-label">Event</label>
                      <select className="input" value={newWh.event} onChange={e => setNewWh({ ...newWh, event: e.target.value })}>
                        {events.map(ev => <option key={ev} value={ev}>{eventIcons[ev] || '🔗'} {ev}</option>)}
                      </select>
                    </div>
                    <div className="input-group"><label className="input-label">Webhook URL</label><input className="input" value={newWh.url} onChange={e => setNewWh({ ...newWh, url: e.target.value })} placeholder="https://discord.com/api/webhooks/..." /></div>
                    <div className="input-group">
                      <label className="input-label">Template (JSON body for Discord)</label>
                      <textarea className="input" value={newWh.template} onChange={e => setNewWh({ ...newWh, template: e.target.value })} placeholder='{"content": "**{server.name}** event at {timestamp}"}' />
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
                      <div className={`toggle ${newWh.retryEnabled ? 'on' : ''}`} onClick={() => setNewWh({ ...newWh, retryEnabled: !newWh.retryEnabled })}><div className="toggle-knob" /></div>
                      <span style={{ fontSize: 13 }}>Enable retry on failure</span>
                    </div>
                    <div className="btn-group"><button className="btn btn-primary" onClick={addWebhook}>Create Webhook</button><button className="btn btn-secondary" onClick={() => setShowAdd(false)}>Cancel</button></div>
                  </div>
                </div>
              )}
            </div>
          )}

          {tab === 'deliveries' && (
            <div>
              {deliveries.length === 0 ? <div className="empty-state"><div className="empty-icon">📬</div><div className="empty-title">No Deliveries Yet</div></div> : (
                <div className="table-wrap"><table>
                  <thead><tr><th>Time</th><th>Event</th><th>Status</th><th>Error</th></tr></thead>
                  <tbody>{deliveries.map((d, i) => (
                    <tr key={i}><td style={{ fontSize: 12, whiteSpace: 'nowrap' }}>{new Date(d.timestamp).toLocaleString()}</td>
                      <td><span className={`webhook-event-badge ${eventColor(d.event)}`}>{d.event}</span></td>
                      <td><span className={`status-badge ${d.status === 'success' ? 'status-running' : 'status-crashed'}`}><span className="status-dot" />{d.status}</span></td>
                      <td style={{ fontSize: 12, color: 'var(--accent-red)' }}>{d.error || '—'}</td>
                    </tr>
                  ))}</tbody>
                </table></div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── DEPLOY PAGE ─────────────────────────────────────
    function DeployPage({ onDeployed }) {
      const [step, setStep] = useState(1);
      const [gameTitle, setGameTitle] = useState('DayZ, PC');
      const [name, setName] = useState('');
      const [installDir, setInstallDir] = useState('C:\\DayZServer');
      const [gamePort, setGamePort] = useState(2302);
      const [queryPort, setQueryPort] = useState(2303);
      const [rconPort, setRconPort] = useState(2305);
      const [rconPassword, setRconPassword] = useState('');
      const [maxPlayers, setMaxPlayers] = useState(60);
      const [map, setMap] = useState('chernarusplus');
      const [deploying, setDeploying] = useState(false);
      const [progress, setProgress] = useState({ status: '', message: '', progress: 0 });

      useEffect(() => {
        const handler = (data) => {
          setProgress(data);
          if (data.status === 'complete') { window.addToast('Server deployed successfully!', 'success'); if (onDeployed) onDeployed(); }
          else if (data.status === 'error') { window.addToast(data.message, 'error'); setDeploying(false); }
        };
        socket.on('deployProgress', handler);
        return () => socket.off('deployProgress', handler);
      }, [onDeployed]);

      const deploy = async () => {
        if (!name || !installDir) { window.addToast('Name and install directory required', 'error'); return; }
        setDeploying(true); setStep(4);
        await API.post('/api/deploy', { name, installDir, gameTitle, gamePort, queryPort, rconPort, rconPassword, maxPlayers, map });
      };

      return (
        <div>
          <div className="deploy-steps">
            <div className={`deploy-step ${step >= 1 ? (step > 1 ? 'done' : 'active') : ''}`}>1. Game Title</div>
            <div className={`deploy-step ${step >= 2 ? (step > 2 ? 'done' : 'active') : ''}`}>2. Server Details</div>
            <div className={`deploy-step ${step >= 3 ? (step > 3 ? 'done' : 'active') : ''}`}>3. Configuration</div>
            <div className={`deploy-step ${step >= 4 ? 'active' : ''}`}>4. Deploy</div>
          </div>

          {step === 1 && (
            <div>
              <h3 style={{ marginBottom: 20 }}>Select Game Title</h3>
              <div className="grid grid-2" style={{ maxWidth: 500 }}>
                <div className={`game-card ${gameTitle === 'DayZ, PC' ? 'selected' : ''}`} onClick={() => setGameTitle('DayZ, PC')}>
                  <div className="game-card-icon">🎮</div>
                  <div className="game-card-title">DayZ PC</div>
                  <div className="game-card-sub">Stable Branch</div>
                </div>
                <div className={`game-card ${gameTitle === 'DayZ, PC (Experimental)' ? 'selected' : ''}`} onClick={() => setGameTitle('DayZ, PC (Experimental)')}>
                  <div className="game-card-icon">🧪</div>
                  <div className="game-card-title">DayZ PC</div>
                  <div className="game-card-sub">Experimental</div>
                </div>
              </div>
              <div style={{ marginTop: 24 }}><button className="btn btn-blue" onClick={() => setStep(2)}>Next →</button></div>
            </div>
          )}

          {step === 2 && (
            <div style={{ maxWidth: 500 }}>
              <h3 style={{ marginBottom: 20 }}>Server Details</h3>
              <div className="input-group"><label className="input-label">Server Name</label><input className="input" value={name} onChange={e => setName(e.target.value)} placeholder="My DayZ Server" /></div>
              <div className="input-group"><label className="input-label">Install Directory</label><input className="input" value={installDir} onChange={e => setInstallDir(e.target.value)} /></div>
              <div className="input-group"><label className="input-label">Map</label>
                <select className="input" value={map} onChange={e => setMap(e.target.value)}>
                  <option value="chernarusplus">Chernarus</option>
                  <option value="enoch">Livonia</option>
                  <option value="deerisle">Deer Isle</option>
                  <option value="namalsk">Namalsk</option>
                </select>
              </div>
              <div className="btn-group" style={{ marginTop: 16 }}>
                <button className="btn btn-secondary" onClick={() => setStep(1)}>← Back</button>
                <button className="btn btn-blue" onClick={() => setStep(3)}>Next →</button>
              </div>
            </div>
          )}

          {step === 3 && (
            <div style={{ maxWidth: 500 }}>
              <h3 style={{ marginBottom: 20 }}>Configuration</h3>
              <div className="grid grid-2">
                <div className="input-group"><label className="input-label">Game Port</label><input className="input" type="number" value={gamePort} onChange={e => setGamePort(parseInt(e.target.value))} /></div>
                <div className="input-group"><label className="input-label">Query Port</label><input className="input" type="number" value={queryPort} onChange={e => setQueryPort(parseInt(e.target.value))} /></div>
                <div className="input-group"><label className="input-label">RCON Port</label><input className="input" type="number" value={rconPort} onChange={e => setRconPort(parseInt(e.target.value))} /></div>
                <div className="input-group"><label className="input-label">Max Players</label><input className="input" type="number" value={maxPlayers} onChange={e => setMaxPlayers(parseInt(e.target.value))} /></div>
              </div>
              <div className="input-group"><label className="input-label">RCON Password</label><input className="input" type="password" value={rconPassword} onChange={e => setRconPassword(e.target.value)} /></div>
              <div className="btn-group" style={{ marginTop: 16 }}>
                <button className="btn btn-secondary" onClick={() => setStep(2)}>← Back</button>
                <button className="btn btn-primary" onClick={deploy}>🚀 Deploy Server</button>
              </div>
            </div>
          )}

          {step === 4 && (
            <div style={{ maxWidth: 500, textAlign: 'center', padding: '40px 0' }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>{progress.status === 'complete' ? '✅' : progress.status === 'error' ? '❌' : '🚀'}</div>
              <h3 style={{ marginBottom: 12 }}>{progress.status === 'complete' ? 'Deployment Complete!' : progress.status === 'error' ? 'Deployment Failed' : 'Deploying...'}</h3>
              <p style={{ color: 'var(--text-muted)', marginBottom: 20 }}>{progress.message || 'Preparing deployment...'}</p>

                <div className="progress-bar" style={{ maxWidth: 400, margin: '0 auto' }}>
                  <div className="progress-fill" style={{ width: `${progress.progress || 5}%` }} />

              {progress.status === 'error' && <button className="btn btn-secondary" onClick={() => { setStep(3); setDeploying(false); }}>← Go Back</button>}
            </div>
          )}
        </div>
      );
    }

    // ─── SERVER SETTINGS ─────────────────────────────────
    // ─── Accordion helper ─────────────────────────────
    // ─── Notification Center ─────────────────────────
    function NotificationCenter() {
      const [open, setOpen] = useState(false);
      const [items, setItems] = useState([]);

      useEffect(() => {
        API.get('/api/notifications').then(function(data) { if (Array.isArray(data)) setItems(data); });
      }, []);

      useEffect(() => {
        var handler = function(n) { setItems(function(prev) { return [n].concat(prev).slice(0, 200); }); };
        socket.on('notification', handler);
        return function() { socket.off('notification', handler); };
      }, []);

      var unreadCount = items.filter(function(n) { return !n.read; }).length;

      var markAllRead = function() {
        API.patch('/api/notifications/read', {}).then(function() {
          setItems(function(prev) { return prev.map(function(n) { return Object.assign({}, n, { read: true }); }); });
        });
      };

      var clearAll = function() {
        API.del('/api/notifications').then(function() { setItems([]); });
      };

      var markOneRead = function(id) {
        API.patch('/api/notifications/read', { ids: [id] }).then(function() {
          setItems(function(prev) { return prev.map(function(n) { return n.id === id ? Object.assign({}, n, { read: true }) : n; }); });
        });
      };

      return (
        <div style={{ position: 'relative' }}>
          <button className="notif-bell" onClick={function() { setOpen(!open); }} title="Notifications">
            🔔
            {unreadCount > 0 && <span className="notif-badge">{unreadCount > 99 ? '99+' : unreadCount}</span>}
          </button>
          {open && <div className="notif-overlay" onClick={function() { setOpen(false); }} />}
          {open && (
            <div className="notif-panel">
              <div className="notif-panel-header">
                <span className="notif-panel-title">Notifications {unreadCount > 0 && <span style={{ color: 'var(--text-muted)', fontWeight: 400, fontSize: 12 }}>({unreadCount} unread)</span>}</span>
                <div className="notif-panel-actions">
                  <button className="notif-panel-btn" onClick={markAllRead}>Mark all read</button>
                  <button className="notif-panel-btn danger" onClick={clearAll}>Clear</button>
                </div>
              </div>
              <div className="notif-list">
                {items.length === 0 ? (
                  <div className="notif-empty">
                    <div className="notif-empty-icon">🔔</div>
                    <div>No notifications yet</div>
                  </div>
                ) : items.map(function(n) {
                  return (
                    <div key={n.id} className={'notif-item' + (!n.read ? ' unread' : '') + (n.severity ? ' severity-' + n.severity : '')} onClick={function() { if (!n.read) markOneRead(n.id); }}>
                      <div className="notif-item-icon">{n.icon || '🔔'}</div>
                      <div className="notif-item-body">
                        <div className="notif-item-title">{n.title}</div>
                        <div className="notif-item-msg">{n.message}</div>
                        <div className="notif-item-time">{timeAgo(n.timestamp)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    function Accordion({ title, icon, defaultOpen, danger, children }) {
      const [open, setOpen] = useState(defaultOpen || false);
      return (
        <div className={'accordion' + (danger ? ' danger' : '')}>
          <div className="accordion-header" onClick={function() { setOpen(!open); }}>
            <h3>{icon && <span>{icon}</span>}{title}</h3>
            <span className={'accordion-chevron' + (open ? ' open' : '')}>&#9660;</span>
          </div>
          {open && <div className="accordion-body">{children}</div>}
        </div>
      );
    }

    // ─── Toggle Switch for settings ──────────────────────
    function SettingsToggle({ label, checked, onChange }) {
      return (
        <div className="switch-row">
          <span className="switch-row-label">{label}</span>
          <div className="switch-status">
            <div className={'toggle' + (checked ? ' on' : '')} onClick={function() { onChange(!checked); }}><div className="toggle-knob" /></div>
            <span className={'switch-status-text' + (checked ? ' active' : ' inactive')}>{checked ? 'Active' : 'Inactive'}</span>
          </div>
        </div>
      );
    }

    function ServerSettingsPage({ serverId }) {
      const [srv, setSrv] = useState(null);
      const [saving, setSaving] = useState(false);
      const [newParam, setNewParam] = useState('');

      useEffect(() => {
        API.get('/api/servers').then(function(servers) {
          var s = servers.find(function(x) { return x.id === serverId; });
          if (s) {
            // Ensure launchParamsList exists
            if (!s.launchParamsList && s.launchParams) {
              s.launchParamsList = s.launchParams.split(' ').filter(Boolean);
            } else if (!s.launchParamsList) {
              s.launchParamsList = [];
            }
            setSrv(s);
          }
        });
      }, [serverId]);

      if (!srv) return null;

      var update = function(key, val) { setSrv(function(s) { return Object.assign({}, s, { [key]: val }); }); };

      var addParam = function() {
        if (!newParam.trim()) return;
        var list = (srv.launchParamsList || []).concat([newParam.trim()]);
        update('launchParamsList', list);
        update('launchParams', list.join(' '));
        setNewParam('');
      };

      var removeParam = function(idx) {
        var list = (srv.launchParamsList || []).filter(function(_, i) { return i !== idx; });
        update('launchParamsList', list);
        update('launchParams', list.join(' '));
      };

      var save = async function() {
        setSaving(true);
        try {
          await API.patch('/api/servers/' + serverId, srv);
          window.addToast('Settings saved', 'success');
        } catch(e) {
          window.addToast('Save failed: ' + e.message, 'error');
        }
        setSaving(false);
      };

      return (
        <div style={{ maxWidth: 760 }}>
          {/* Sticky Save Bar */}
          <div className="settings-save-bar">
            <button className="settings-save-btn" onClick={save} disabled={saving}>
              {saving ? 'Saving...' : 'Save'}
            </button>
          </div>

          {/* Process */}
          <Accordion title="Process" icon="" defaultOpen={true}>
            <div style={{ marginBottom: 14 }}>
              <div className="settings-row-label" style={{ marginBottom: 8 }}>Launch Params</div>
              <div className="chip-list">
                {(srv.launchParamsList || []).map(function(p, i) {
                  return (
                    <div className="chip" key={i}>
                      {p}
                      <span className="chip-remove" onClick={function() { removeParam(i); }} title="Remove">&#10005;</span>
                    </div>
                  );
                })}
              </div>
              <div className="chip-add">
                <input className="input" placeholder="Add new launch parameter..." value={newParam}
                  onChange={function(e) { setNewParam(e.target.value); }}
                  onKeyDown={function(e) { if (e.key === 'Enter') addParam(); }} />
                <button className="btn btn-primary btn-sm" onClick={addParam}>Add</button>
              </div>
            </div>
            <SettingsToggle label="Auto-Start Server" checked={!!srv.autoStart} onChange={function(v) { update('autoStart', v); }} />
            <div className="settings-row">
              <span className="settings-row-label">Game Port</span>
              <div className="settings-row-value"><input className="input" type="number" value={srv.gamePort || 2302} onChange={function(e) { update('gamePort', parseInt(e.target.value) || 2302); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Query Port</span>
              <div className="settings-row-value"><input className="input" type="number" value={srv.queryPort || 2303} onChange={function(e) { update('queryPort', parseInt(e.target.value) || 2303); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">RCon Port</span>
              <div className="settings-row-value"><input className="input" type="number" value={srv.rconPort || 2305} onChange={function(e) { update('rconPort', parseInt(e.target.value) || 2305); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Network Interface</span>
              <div className="settings-row-value"><input className="input" value={srv.networkInterface || '0.0.0.0'} onChange={function(e) { update('networkInterface', e.target.value); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">RCon Password</span>
              <div className="settings-row-value">
                <input className="input" value={srv.rconPassword || ''} onChange={function(e) { update('rconPassword', e.target.value); }} />
                <div className="settings-hint">{(srv.rconPassword || '').length}/255 characters &nbsp;&nbsp; battleye_rcon RCon</div>
              </div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">CPU Affinity Mask</span>
              <div className="settings-row-value">
                <input className="input" type="number" value={srv.cpuAffinity || 0} onChange={function(e) { update('cpuAffinity', parseInt(e.target.value) || 0); }} />
                <div className="settings-hint">{srv.cpuAffinity ? 'Custom Affinity Mask Configured (' + srv.cpuAffinity + ')' : 'Default (all cores)'}</div>
              </div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Priority Level</span>
              <div className="settings-row-value">
                <select className="input" value={srv.priorityLevel || 'Normal'} onChange={function(e) { update('priorityLevel', e.target.value); }}>
                  <option value="Idle">Idle</option>
                  <option value="BelowNormal">Below Normal</option>
                  <option value="Normal">Normal</option>
                  <option value="AboveNormal">Above Normal</option>
                  <option value="High">High</option>
                  <option value="RealTime">Real Time</option>
                </select>
              </div>
            </div>
          </Accordion>

          {/* Environment */}
          <Accordion title="Environment" icon="">
            <div className="settings-row">
              <span className="settings-row-label">Server Name</span>
              <div className="settings-row-value"><input className="input" value={srv.name || ''} onChange={function(e) { update('name', e.target.value); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Install Directory</span>
              <div className="settings-row-value"><input className="input" value={srv.installDir || ''} onChange={function(e) { update('installDir', e.target.value); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Profile Directory</span>
              <div className="settings-row-value"><input className="input" value={srv.profileDir || ''} onChange={function(e) { update('profileDir', e.target.value); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Executable</span>
              <div className="settings-row-value"><input className="input" value={srv.executable || ''} onChange={function(e) { update('executable', e.target.value); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Start Batch File</span>
              <div className="settings-row-value">
                <input className="input" value={srv.startBat || ''} onChange={function(e) { update('startBat', e.target.value); }} placeholder="Optional .bat file" />
              </div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Server IP</span>
              <div className="settings-row-value"><input className="input" value={srv.ip || '127.0.0.1'} onChange={function(e) { update('ip', e.target.value); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Map</span>
              <div className="settings-row-value"><input className="input" value={srv.map || 'chernarusplus'} onChange={function(e) { update('map', e.target.value); }} /></div>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Game Title</span>
              <div className="settings-row-value"><input className="input" value={srv.gameTitle || 'DayZ, PC'} onChange={function(e) { update('gameTitle', e.target.value); }} /></div>
            </div>
          </Accordion>

          {/* Server Operations */}
          <Accordion title="Server Operations" icon="">
            <SettingsToggle label="Process Integrity Checks" checked={!!srv.processIntegrityChecks} onChange={function(v) { update('processIntegrityChecks', v); }} />
            <SettingsToggle label="Integrity Check Mods" checked={!!srv.integrityCheckMods} onChange={function(v) { update('integrityCheckMods', v); }} />
            <div className="settings-row">
              <span className="settings-row-label">Grace period for process start (seconds)</span>
              <div className="settings-row-value">
                <input className="input" type="number" value={srv.startGracePeriod || 30} onChange={function(e) { update('startGracePeriod', parseInt(e.target.value) || 30); }} />
              </div>
            </div>
            <SettingsToggle label="Server Health Monitoring" checked={!!srv.healthMonitoring} onChange={function(v) { update('healthMonitoring', v); }} />
            {srv.healthMonitoring && (
              <div style={{ padding: '8px 0 0 0' }}>
                <div className="settings-row">
                  <span className="settings-row-label">Min FPS Threshold</span>
                  <div className="settings-row-value"><input className="input" type="number" value={srv.healthMinFPS || 5} onChange={function(e) { update('healthMinFPS', parseInt(e.target.value) || 5); }} /></div>
                </div>
                <div className="settings-row">
                  <span className="settings-row-label">Max RAM % Threshold</span>
                  <div className="settings-row-value"><input className="input" type="number" value={srv.healthMaxRAM || 90} onChange={function(e) { update('healthMaxRAM', parseInt(e.target.value) || 90); }} /></div>
                </div>
                <div className="settings-row">
                  <span className="settings-row-label">Action on Threshold</span>
                  <div className="settings-row-value">
                    <select className="input" value={srv.healthAction || 'log'} onChange={function(e) { update('healthAction', e.target.value); }}>
                      <option value="log">Log Warning Only</option>
                      <option value="restart">Auto-Restart Server</option>
                      <option value="webhook">Send Webhook Alert</option>
                    </select>
                  </div>
                </div>
              </div>
            )}
          </Accordion>

          {/* Update Behaviour */}
          <Accordion title="Update Behaviour" icon="">
            <SettingsToggle label="Shutdown for mod updates" checked={srv.shutdownForModUpdates !== false} onChange={function(v) { update('shutdownForModUpdates', v); }} />
            <SettingsToggle label="Shutdown for title updates" checked={srv.shutdownForTitleUpdates !== false} onChange={function(v) { update('shutdownForTitleUpdates', v); }} />
            <SettingsToggle label="Ignore server-side mod updates" checked={!!srv.ignoreServerModUpdates} onChange={function(v) { update('ignoreServerModUpdates', v); }} />
          </Accordion>

          {/* Dangerzone */}
          <Accordion title="Dangerzone" icon="" danger={true}>
            <div style={{ color: 'var(--text-muted)', fontSize: 12, marginBottom: 12 }}>
              These operations can permanently affect your server. Proceed with caution.
            </div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <button className="btn btn-danger btn-sm" onClick={function() {
                if (window.confirm('Are you sure you want to delete this server from the panel? This does not delete server files.')) {
                  API.del('/api/servers/' + serverId).then(function() {
                    window.addToast('Server removed from panel', 'success');
                    window.location.reload();
                  });
                }
              }}>Delete Server</button>
            </div>
          </Accordion>
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(() => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } });
      const [page, setPage] = useState('hub');
      const [servers, setServers] = useState([]);
      const [selectedServer, setSelectedServer] = useState(null);
      const [serverTab, setServerTab] = useState('overview');

      // Load servers
      const loadServers = useCallback(async () => {
        if (!API.token) return;
        const data = await API.get('/api/servers');
        if (Array.isArray(data)) setServers(data);
      }, []);

      useEffect(() => { if (user) { loadServers(); const i = setInterval(loadServers, 10000); return () => clearInterval(i); } }, [user, loadServers]);

      useEffect(() => {
        const handler = (data) => {
          setServers(svrs => svrs.map(s => s.id === data.serverId ? { ...s, status: data.status } : s));
        };
        socket.on('serverStatus', handler);
        return () => socket.off('serverStatus', handler);
      }, []);

      const selectServer = (id) => { setSelectedServer(id); setPage('server'); setServerTab('overview'); };

      const handleStart = async () => { if (!selectedServer) return; await API.post(`/api/servers/${selectedServer}/start`); window.addToast('Starting server...', 'info'); };
      const handleStop = async () => { if (!selectedServer) return; await API.post(`/api/servers/${selectedServer}/stop`); window.addToast('Stopping server...', 'info'); };
      const handleRestart = async () => { if (!selectedServer) return; await API.post(`/api/servers/${selectedServer}/restart`); window.addToast('Restarting server...', 'info'); };

      const currentServerStatus = useMemo(() => servers.find(s => s.id === selectedServer)?.status || 'stopped', [servers, selectedServer]);

      if (!user) return <><LoginScreen onLogin={setUser} /><ToastContainer /></>;

      const navItems = page === 'server' ? [
        { id: 'overview', icon: '📊', label: 'Overview' },
        { id: 'metrics', icon: '📈', label: 'Metrics' },
        { id: 'console', icon: '🖥️', label: 'Console' },
        { id: 'players', icon: '👥', label: 'Players' },
        { id: 'mods', icon: '📦', label: 'Mods' },
        { id: 'files', icon: '📁', label: 'Files' },
        { id: 'config', icon: '⚙️', label: 'Configuration' },
        { id: 'logs', icon: '📋', label: 'Logs' },
        { id: 'bans', icon: '🛡️', label: 'Bans' },
        { id: 'scheduler', icon: '📅', label: 'Scheduler' },
        { id: 'settings', icon: '🔧', label: 'Settings' },
      ] : [];

      const pageTitle = page === 'hub' ? 'Server Hub' : page === 'users' ? 'Users & Roles' : page === 'webhooks' ? 'Webhooks' : page === 'deploy' ? 'Deploy Server' : servers.find(s => s.id === selectedServer)?.name || 'Server';

      return (
        <div className="app">
          <div className="sidebar">
            <div className="sidebar-header">
              <div className="sidebar-logo">
                <div className="logo-icon">DZ</div>
                <div><div className="logo-text">DayZ Panel</div><div className="logo-sub">Server Management</div></div>
              </div>
              {page === 'server' && servers.length > 0 && (
                <div className="server-selector">
                  <select value={selectedServer || ''} onChange={e => selectServer(e.target.value)}>
                    {servers.map(s => <option key={s.id} value={s.id}>{s.name} ({s.status})</option>)}
                  </select>
                </div>
              )}
            </div>

            <div className="sidebar-nav">
              <div className="nav-section">General</div>
              <div className={`nav-item ${page === 'hub' ? 'active' : ''}`} onClick={() => { setPage('hub'); setSelectedServer(null); }}>
                <span className="nav-icon">🏠</span>Server Hub
                {servers.filter(s => s.status === 'running').length > 0 && <span className="nav-badge">{servers.filter(s => s.status === 'running').length}</span>}
              </div>
              <div className={`nav-item ${page === 'deploy' ? 'active' : ''}`} onClick={() => setPage('deploy')}>
                <span className="nav-icon">🚀</span>Deploy Server
              </div>
              <div className={`nav-item ${page === 'users' ? 'active' : ''}`} onClick={() => setPage('users')}>
                <span className="nav-icon">👤</span>Users
              </div>
              <div className={`nav-item ${page === 'webhooks' ? 'active' : ''}`} onClick={() => setPage('webhooks')}>
                <span className="nav-icon">🔗</span>Webhooks
              </div>

              {page === 'server' && (
                <>
                  <div className="nav-section" style={{ marginTop: 12 }}>{servers.find(s => s.id === selectedServer)?.name || 'Server'}</div>
                  {navItems.map(item => (
                    <div key={item.id} className={`nav-item ${serverTab === item.id ? 'active' : ''}`} onClick={() => setServerTab(item.id)}>
                      <span className="nav-icon">{item.icon}</span>{item.label}
                    </div>
                  ))}
                </>
              )}
            </div>

            <div className="sidebar-footer">
              <div className="avatar">{user.username?.[0]?.toUpperCase()}</div>
              <div className="user-info"><div className="user-name">{user.username}</div><div className="user-role">{user.role}</div></div>
              <button className="logout-btn" onClick={() => { API.token = ''; localStorage.clear(); setUser(null); }} title="Sign out">⏻</button>
            </div>
          </div>

          <div className="main">
            <div className="main-header">
              <div>
                <div className="main-title">{pageTitle}</div>
                {page === 'server' && <div className="main-subtitle">
                  <span className={`status-badge status-${currentServerStatus}`} style={{ marginRight: 8 }}><span className="status-dot" />{currentServerStatus}</span>
                  {serverTab}
                </div>}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <NotificationCenter />
                {page === 'server' && (
                  <div className="btn-group">
                    <button className="btn btn-primary btn-sm" onClick={handleStart} disabled={currentServerStatus === 'running' || currentServerStatus === 'starting'}>▶ Start</button>
                    <button className="btn btn-danger btn-sm" onClick={handleStop} disabled={currentServerStatus === 'stopped'}>⏹ Stop</button>
                    <button className="btn btn-secondary btn-sm" onClick={handleRestart}>🔄 Restart</button>
                  </div>
                )}
                {page === 'hub' && (
                  <button className="btn btn-blue btn-sm" onClick={() => loadServers()}>🔄 Refresh</button>
                )}
              </div>
            </div>

            <div className="main-content">
              <ErrorBoundary>
              {page === 'hub' && <ServerHubPage servers={servers} onSelect={selectServer} />}
              {page === 'deploy' && <DeployPage onDeployed={loadServers} />}
              {page === 'users' && <UsersPage />}
              {page === 'webhooks' && <WebhooksPage />}
              {page === 'server' && selectedServer && (
                <ErrorBoundary>
                  {serverTab === 'overview' && <ServerOverviewPage serverId={selectedServer} />}
                  {serverTab === 'metrics' && <ServerMetricsPage serverId={selectedServer} />}
                  {serverTab === 'console' && <ConsolePage serverId={selectedServer} />}
                  {serverTab === 'players' && <PlayersPage serverId={selectedServer} />}
                  {serverTab === 'mods' && <ModsPage serverId={selectedServer} />}
                  {serverTab === 'files' && <FilesPage serverId={selectedServer} />}
                  {serverTab === 'config' && <ConfigPage serverId={selectedServer} />}
                  {serverTab === 'logs' && <LogsPage serverId={selectedServer} />}
                  {serverTab === 'bans' && <BansPage serverId={selectedServer} />}
                  {serverTab === 'scheduler' && <SchedulerPage serverId={selectedServer} />}
                  {serverTab === 'settings' && <ServerSettingsPage serverId={selectedServer} />}
                </ErrorBoundary>
              )}
              </ErrorBoundary>
            </div>
          </div>
          <ToastContainer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
