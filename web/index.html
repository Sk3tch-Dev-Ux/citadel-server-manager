<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayZ Server Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #1b1e24;
      --bg-surface: #22262e;
      --bg-card: #2a2e37;
      --bg-elevated: #323843;
      --border: #3c4250;
      --border-active: #515a6b;
      --text-primary: #dce0e8;
      --text-secondary: #9ba3b0;
      --text-muted: #6b7384;
      --accent-green: #5cb85c;
      --accent-green-dim: #4cae4c;
      --accent-red: #e06c75;
      --accent-red-dim: #c85a63;
      --accent-yellow: #e5c07b;
      --accent-blue: #6cb4f0;
      --accent-blue-dim: #539be0;
      --accent-purple: #c49bff;
      --accent-orange: #e0976b;
      --font-display: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 8px;
      --radius-lg: 12px;
      --glow-green: 0 0 16px rgba(92,184,92,0.12);
      --glow-red: 0 0 16px rgba(224,108,117,0.12);
      --glow-blue: 0 0 20px rgba(108,180,240,0.18);
    }
    html, body, #root { height: 100%; }
    body { background: var(--bg-deep); color: var(--text-primary); font-family: var(--font-display); -webkit-font-smoothing: antialiased; overflow: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

    .app { display: flex; height: 100vh; }
    .sidebar { width: 260px; min-width: 260px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
    .sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #fff; }
    .logo-text { font-weight: 700; font-size: 17px; }
    .logo-sub { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .server-selector { margin-top: 8px; }
    .server-selector select { width: 100%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: var(--radius); font-family: var(--font-display); font-size: 13px; cursor: pointer; outline: none; }
    .server-selector select:focus { border-color: var(--accent-blue); }

    .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .nav-section { padding: 8px 20px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 600; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer; transition: all 0.15s; color: var(--text-secondary); font-size: 13.5px; font-weight: 500; border-left: 3px solid transparent; }
    .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text-primary); }
    .nav-item.active { color: var(--accent-blue); background: rgba(108,180,240,0.08); border-left-color: var(--accent-blue); }
    .nav-icon { width: 20px; text-align: center; font-size: 15px; }
    .nav-badge { margin-left: auto; background: var(--accent-blue); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sidebar-footer .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(108,180,240,0.12); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--accent-blue); }
    .sidebar-footer .user-info { flex: 1; }
    .sidebar-footer .user-name { font-size: 13px; font-weight: 600; }
    .sidebar-footer .user-role { font-size: 11px; color: var(--text-muted); }
    .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 4px; }
    .logout-btn:hover { color: var(--accent-red); }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .main-header { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg-surface); }
    .main-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .main-subtitle { font-size: 12px; color: var(--text-muted); }
    .main-content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* Cards & Grid */
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    @media (max-width: 1200px) { .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); } }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 600; }
    .card-value { font-size: 28px; font-weight: 700; font-family: var(--font-mono); }

    /* Stat boxes */
    .stat-row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-box { flex: 1; min-width: 140px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 700; font-family: var(--font-mono); }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Status badges */
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-running { background: rgba(92,184,92,0.12); color: var(--accent-green); }
    .status-stopped { background: rgba(107,115,132,0.1); color: var(--text-muted); }
    .status-starting { background: rgba(229,192,123,0.12); color: var(--accent-yellow); }
    .status-stopping { background: rgba(229,192,123,0.12); color: var(--accent-yellow); }
    .status-crashed { background: rgba(224,108,117,0.12); color: var(--accent-red); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-running .status-dot { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
    .status-stopped .status-dot { background: var(--text-muted); }
    .status-starting .status-dot { background: var(--accent-yellow); animation: pulse 1s infinite; }
    .status-stopping .status-dot { background: var(--accent-yellow); animation: pulse 1s infinite; }
    .status-crashed .status-dot { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: var(--radius); font-family: var(--font-display); font-size: 13px; font-weight: 600; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: var(--accent-blue); color: #fff; }
    .btn-primary:hover { background: var(--accent-blue-dim); }
    .btn-danger { background: var(--accent-red); color: white; }
    .btn-danger:hover { background: var(--accent-red-dim); }
    .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border); }
    .btn-secondary:hover { border-color: var(--border-active); background: var(--bg-card); }
    .btn-blue { background: var(--accent-blue); color: white; }
    .btn-blue:hover { background: var(--accent-blue-dim); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-icon { width: 34px; height: 34px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; font-size: 14px; }
    .btn-icon:hover { border-color: var(--border-active); color: var(--text-primary); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-group { display: flex; gap: 8px; }

    /* Inputs */
    .input { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); padding: 9px 14px; border-radius: var(--radius); font-family: var(--font-display); font-size: 13px; outline: none; width: 100%; transition: border 0.15s; }
    .input:focus { border-color: var(--accent-blue); }
    .input-group { margin-bottom: 14px; }
    .input-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    select.input { cursor: pointer; }
    textarea.input { resize: vertical; min-height: 80px; font-family: var(--font-mono); font-size: 12px; }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 600; }
    td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab { padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab:hover { color: var(--text-secondary); }
    .tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

    /* Server Hub Cards */
    .server-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .server-card:hover { border-color: var(--border-active); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .server-card.running { border-color: rgba(108,180,240,0.25); }
    .server-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .server-card-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .server-card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .server-card-stat { }
    .server-card-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); }
    .server-card-stat-value { font-size: 15px; font-weight: 600; font-family: var(--font-mono); }
    .server-card-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--border); }
    .server-card-bar-fill { height: 100%; background: var(--accent-blue); transition: width 0.5s; }

    /* Console */
    .console-wrap { background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--radius-lg); height: calc(100vh - 250px); display: flex; flex-direction: column; }
    .console-output { flex: 1; padding: 16px; overflow-y: auto; font-family: var(--font-mono); font-size: 12px; line-height: 1.7; }
    .console-line { padding: 1px 0; }
    .console-line.info { color: var(--accent-blue); }
    .console-line.error { color: var(--accent-red); }
    .console-line.warn { color: var(--accent-yellow); }
    .console-time { color: var(--text-muted); margin-right: 10px; }
    .console-input { display: flex; border-top: 1px solid var(--border); }
    .console-input input { flex: 1; background: transparent; border: none; padding: 14px 16px; color: var(--text-primary); font-family: var(--font-mono); font-size: 13px; outline: none; }
    .console-input button { background: var(--accent-blue); color: #fff; border: none; padding: 0 20px; font-weight: 700; cursor: pointer; font-family: var(--font-display); }

    /* Login */
    .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-deep); }
    .login-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; width: 380px; }
    .login-title { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .login-sub { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
    .login-error { background: rgba(224,108,117,0.1); border: 1px solid rgba(224,108,117,0.2); color: var(--accent-red); padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; width: 480px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
    .modal-lg { width: 640px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    /* File Explorer - VS Code Style */
    .file-explorer { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 140px); gap: 0; background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
    .file-sidebar { background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .file-sidebar-header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; }
    .file-search { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .file-search input { width: 100%; background: var(--bg-deep); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-size: 12px; font-family: var(--font-mono); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .file-search input:focus { border-color: var(--accent-blue); }
    .file-sidebar-tree { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 2px 0; }
    .file-sidebar-tree::-webkit-scrollbar { width: 6px; }
    .file-sidebar-tree::-webkit-scrollbar-track { background: transparent; }
    .file-sidebar-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .tree-node { display: flex; align-items: center; gap: 4px; padding: 3px 8px; cursor: pointer; font-size: 13px; font-family: var(--font-mono); color: var(--text-secondary); white-space: nowrap; user-select: none; transition: background 0.08s; }
    .tree-node:hover { background: var(--bg-elevated); }
    .tree-node.selected { background: rgba(108,180,240,0.15); color: var(--accent-blue); }
    .tree-arrow { width: 16px; text-align: center; font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
    .tree-icon { flex-shrink: 0; font-size: 14px; }
    .tree-name { overflow: hidden; text-overflow: ellipsis; }
    .tree-loading { font-size: 12px; color: var(--text-muted); padding: 4px 8px; font-style: italic; }
    .file-editor-panel { display: flex; flex-direction: column; overflow: hidden; background: var(--bg-deep); }
    .editor-tabs { display: flex; background: var(--bg-surface); border-bottom: 1px solid var(--border); overflow-x: auto; min-height: 36px; flex-shrink: 0; }
    .editor-tabs::-webkit-scrollbar { height: 3px; }
    .editor-tabs::-webkit-scrollbar-thumb { background: var(--border); }
    .editor-tab { display: flex; align-items: center; gap: 6px; padding: 0 12px; height: 36px; font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); cursor: pointer; border-right: 1px solid var(--border); white-space: nowrap; transition: all 0.08s; flex-shrink: 0; position: relative; }
    .editor-tab:hover { background: var(--bg-elevated); color: var(--text-secondary); }
    .editor-tab.active { background: var(--bg-deep); color: var(--text-primary); }
    .editor-tab.active::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent-blue); }
    .tab-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent-yellow); flex-shrink: 0; }
    .editor-tab .tab-close { font-size: 16px; line-height: 1; opacity: 0; transition: opacity 0.1s; padding: 1px 3px; border-radius: 3px; flex-shrink: 0; }
    .editor-tab:hover .tab-close { opacity: 0.5; }
    .editor-tab .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    .editor-breadcrumb { display: flex; align-items: center; gap: 4px; padding: 3px 16px; font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); background: var(--bg-surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .editor-breadcrumb .sep { color: var(--text-muted); font-size: 10px; }
    .editor-container { flex: 1; overflow: hidden; }
    .editor-status-bar { display: flex; align-items: center; justify-content: space-between; padding: 2px 16px; font-size: 11px; font-family: var(--font-mono); color: #fff; background: var(--accent-blue-dim); flex-shrink: 0; min-height: 24px; }
    .editor-status-bar .status-left, .editor-status-bar .status-right { display: flex; align-items: center; gap: 16px; }
    .editor-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 14px; gap: 12px; background: var(--bg-deep); }
    .editor-empty .icon { font-size: 52px; opacity: 0.2; }
    .editor-empty .shortcuts { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; font-size: 12px; color: var(--text-muted); text-align: center; }
    .editor-empty .shortcuts kbd { background: var(--bg-elevated); padding: 2px 8px; border-radius: 3px; border: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; }

    /* Charts */
    .chart-container { position: relative; height: 200px; background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .chart-canvas { width: 100%; height: 100%; }

    /* Toast */
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; font-size: 13px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s; min-width: 280px; }
    .toast.success { border-color: rgba(92,184,92,0.3); }
    .toast.error { border-color: rgba(224,108,117,0.3); }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Deploy wizard */
    .deploy-steps { display: flex; gap: 8px; margin-bottom: 28px; }
    .deploy-step { flex: 1; text-align: center; padding: 10px; border-radius: var(--radius); font-size: 12px; font-weight: 600; background: var(--bg-elevated); color: var(--text-muted); }
    .deploy-step.active { background: rgba(108,180,240,0.15); color: var(--accent-blue); }
    .deploy-step.done { background: rgba(108,180,240,0.12); color: var(--accent-blue); }
    .game-card { background: var(--bg-elevated); border: 2px solid var(--border); border-radius: var(--radius-lg); padding: 24px; cursor: pointer; text-align: center; transition: all 0.2s; }
    .game-card:hover { border-color: var(--border-active); }
    .game-card.selected { border-color: var(--accent-blue); background: rgba(108,180,240,0.08); }
    .game-card-icon { font-size: 40px; margin-bottom: 12px; }
    .game-card-title { font-size: 15px; font-weight: 700; }
    .game-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* Role badge */
    .role-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }

    /* Progress bar */
    .progress-bar { height: 6px; background: var(--bg-deep); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent-blue); border-radius: 3px; transition: width 0.5s; }

    /* Toggle */
    .toggle { position: relative; width: 40px; height: 22px; background: var(--bg-deep); border: 1px solid var(--border); border-radius: 11px; cursor: pointer; transition: all 0.2s; }
    .toggle.on { background: var(--accent-blue); border-color: var(--accent-blue); }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
    .toggle.on .toggle-knob { transform: translateX(18px); }

    /* Workshop styles */
    .workshop-search-box { position: relative; }
    .workshop-search-box input { width: 100%; padding-left: 36px; }
    .workshop-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
    .workshop-results { display: grid; gap: 8px; margin-top: 12px; max-height: 500px; overflow-y: auto; }
    .workshop-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); transition: all 0.15s ease; }
    .workshop-item:hover { border-color: var(--accent-blue); background: var(--bg-elevated); }
    .workshop-item.installed { opacity: 0.5; border-color: var(--border); }
    .workshop-thumb { width: 64px; height: 40px; border-radius: 4px; object-fit: cover; background: var(--bg-deep); flex-shrink: 0; }
    .workshop-info { flex: 1; min-width: 0; }
    .workshop-info-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .workshop-info-meta { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
    .workshop-info-desc { font-size: 11px; color: var(--text-secondary); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; }
    .workshop-info-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .workshop-info-tags span { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted); }
    .workshop-btn { flex-shrink: 0; padding: 6px 14px; font-size: 12px; font-weight: 600; background: var(--accent-blue); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s; }
    .workshop-btn:hover { opacity: 0.85; }
    .workshop-btn:disabled { background: var(--border); color: var(--text-muted); cursor: default; }
    .workshop-loading { text-align: center; padding: 24px; color: var(--text-muted); font-size: 13px; }
    .mod-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; transition: all 0.15s; }
    .mod-item:hover { border-color: var(--border-active); }
    .mod-order { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); min-width: 28px; }
    .mod-name { flex: 1; font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mod-id { font-size: 11px; font-family: var(--font-mono); color: var(--accent-blue); text-decoration: none; }
    .mod-id:hover { text-decoration: underline; }

    /* Notification Bell & Panel */
    .notif-bell { position: relative; cursor: pointer; padding: 6px 8px; border-radius: var(--radius); transition: background 0.15s; border: none; background: none; color: var(--text-secondary); font-size: 18px; }
    .notif-bell:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
    .notif-badge { position: absolute; top: 2px; right: 2px; min-width: 16px; height: 16px; background: var(--accent-red); color: #fff; font-size: 9px; font-weight: 700; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
    .notif-panel { position: absolute; top: calc(100% + 8px); right: 0; width: 380px; max-height: 480px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: 0 12px 40px rgba(0,0,0,0.4); z-index: 100; display: flex; flex-direction: column; }
    .notif-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .notif-panel-title { font-size: 14px; font-weight: 700; }
    .notif-panel-actions { display: flex; gap: 8px; }
    .notif-panel-btn { background: none; border: none; color: var(--accent-blue); font-size: 11px; cursor: pointer; font-family: var(--font-display); font-weight: 600; padding: 2px 6px; border-radius: 4px; }
    .notif-panel-btn:hover { background: rgba(108,180,240,0.1); }
    .notif-panel-btn.danger { color: var(--accent-red); }
    .notif-panel-btn.danger:hover { background: rgba(224,108,117,0.1); }
    .notif-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .notif-item { display: flex; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background 0.12s; border-left: 3px solid transparent; }
    .notif-item:hover { background: rgba(255,255,255,0.03); }
    .notif-item.unread { background: rgba(108,180,240,0.04); border-left-color: var(--accent-blue); }
    .notif-item.severity-error { border-left-color: var(--accent-red); }
    .notif-item.severity-warning { border-left-color: var(--accent-yellow); }
    .notif-item.severity-success { border-left-color: var(--accent-green); }
    .notif-item-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .notif-item-body { flex: 1; min-width: 0; }
    .notif-item-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notif-item-msg { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notif-item-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
    .notif-empty { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
    .notif-empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
    .notif-overlay { position: fixed; inset: 0; z-index: 99; }

    /* Accordion / Settings sections */
    .accordion { margin-bottom: 10px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--bg-card); cursor: pointer; user-select: none; transition: background 0.15s; }
    .accordion-header:hover { background: var(--bg-elevated); }
    .accordion-header h3 { font-size: 14px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px; }
    .accordion-chevron { font-size: 12px; color: var(--text-muted); transition: transform 0.2s ease; }
    .accordion-chevron.open { transform: rotate(180deg); }
    .accordion-body { padding: 18px; background: var(--bg-surface); border-top: 1px solid var(--border); }
    .accordion.danger { border-color: rgba(224,108,117,0.35); }
    .accordion.danger .accordion-header h3 { color: var(--accent-red); }

    /* Settings-specific */
    .settings-save-bar { position: sticky; top: 0; z-index: 5; padding: 12px 0; margin-bottom: 16px; }
    .settings-save-btn { width: 100%; padding: 12px; font-size: 14px; font-weight: 700; background: var(--accent-blue); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s; }
    .settings-save-btn:hover { opacity: 0.85; }
    .settings-save-btn:disabled { opacity: 0.5; cursor: default; }
    .settings-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label { min-width: 160px; font-size: 13px; font-weight: 500; color: var(--text-secondary); flex-shrink: 0; }
    .settings-row-value { flex: 1; }
    .settings-row .input { width: 100%; }
    .settings-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Chip / Tag input */
    .chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: var(--font-mono); color: var(--text-primary); }
    .chip-remove { cursor: pointer; color: var(--accent-red); font-size: 14px; line-height: 1; }
    .chip-remove:hover { opacity: 0.7; }
    .chip-add { display: flex; gap: 6px; }
    .chip-add input { flex: 1; }
    .chip-add button { flex-shrink: 0; }

    /* Toggle switch (settings variant) */
    .switch-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; }
    .switch-row-label { font-size: 13px; font-weight: 500; }
    .switch-status { display: flex; align-items: center; gap: 8px; }
    .switch-status-text { font-size: 12px; font-weight: 600; }
    .switch-status-text.active { color: var(--accent-blue); }
    .switch-status-text.inactive { color: var(--text-muted); }

    /* Permission chips */
    .perm-chip { display: inline-flex; padding: 3px 8px; margin: 2px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary); }
    .perm-chip.active { background: rgba(108,180,240,0.1); border-color: rgba(108,180,240,0.3); color: var(--accent-blue); cursor: pointer; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }

    /* Webhook */
    .webhook-event-badge { display: inline-flex; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: var(--font-mono); }
    .webhook-event-badge.started { background: rgba(92,184,92,0.12); color: var(--accent-green); }
    .webhook-event-badge.stopped { background: rgba(224,108,117,0.12); color: var(--accent-red); }
    .webhook-event-badge.crashed { background: rgba(229,192,123,0.12); color: var(--accent-yellow); }
    .webhook-event-badge.restarted { background: rgba(108,180,240,0.12); color: var(--accent-blue); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script>
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    require(['vs/editor/editor.main'], function() { window.monacoReady = true; });
  </script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ─── Error Boundary ──────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { this.setState({ errorInfo }); console.error('React ErrorBoundary caught:', error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return React.createElement('div', { style: { padding: 24, background: '#2a2e37', borderRadius: 8, border: '1px solid #e74c3c', margin: 16 } },
            React.createElement('h3', { style: { color: '#e74c3c', marginBottom: 8 } }, 'Something went wrong'),
            React.createElement('pre', { style: { color: '#ccc', fontSize: 12, whiteSpace: 'pre-wrap', marginBottom: 12, maxHeight: 200, overflow: 'auto' } },
              String(this.state.error) + (this.state.errorInfo ? '\n' + this.state.errorInfo.componentStack : '')),
            React.createElement('button', { onClick: () => this.setState({ hasError: false, error: null, errorInfo: null }),
              style: { padding: '6px 16px', background: '#6cb4f0', color: '#fff', border: 'none', borderRadius: 4, cursor: 'pointer' } }, 'Try Again')
          );
        }
        return this.props.children;
      }
    }

    // ─── API Client ──────────────────────────────────────
    const API_BASE = window.location.port === '3001' ? '' : 'http://localhost:3001';
    const socket = io(API_BASE || window.location.origin);

    class API {
      static token = localStorage.getItem('token') || '';
      static headers() { return { 'Content-Type': 'application/json', Authorization: `Bearer ${this.token}` }; }
      static async get(url) { const r = await fetch(`${API_BASE}${url}`, { headers: this.headers() }); if (r.status === 401) { this.token = ''; localStorage.removeItem('token'); window.location.reload(); } return r.json(); }
      static async post(url, data) { const r = await fetch(`${API_BASE}${url}`, { method: 'POST', headers: this.headers(), body: JSON.stringify(data) }); return r.json(); }
      static async patch(url, data) { const r = await fetch(`${API_BASE}${url}`, { method: 'PATCH', headers: this.headers(), body: JSON.stringify(data) }); return r.json(); }
      static async put(url, data) { const r = await fetch(`${API_BASE}${url}`, { method: 'PUT', headers: this.headers(), body: JSON.stringify(data) }); return r.json(); }
      static async del(url) { const r = await fetch(`${API_BASE}${url}`, { method: 'DELETE', headers: this.headers() }); return r.json(); }
    }

    // ─── Helpers ──────────────────────────────────────────
    function formatUptime(s) {
      if (!s || s <= 0) return '—';
      const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
      if (d > 0) return `${d}d ${h}h`;
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }
    function formatBytes(b) {
      b = Number(b);
      if (!b || isNaN(b)) return '0 B';
      const u = ['B','KB','MB','GB']; let i = 0;
      while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
      return b.toFixed(1) + ' ' + u[i];
    }
    function timeAgo(d) {
      if (!d) return '';
      const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
      return `${Math.floor(s / 86400)}d ago`;
    }

    // ─── Toast System ────────────────────────────────────
    let toastId = 0;
    function ToastContainer() {
      const [toasts, setToasts] = useState([]);
      useEffect(() => {
        window.addToast = (msg, type = 'info') => {
          const id = ++toastId;
          setToasts(t => [...t, { id, msg, type }]);
          setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
        };
      }, []);
      return <div className="toast-container">{toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : 'ℹ️'} {t.msg}</div>)}</div>;
    }

    // ─── Mini Canvas Chart ───────────────────────────────
    function MiniChart({ data, color = '#6cb4f0', height = 200, label }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !data || data.length === 0) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width = canvas.offsetWidth * 2;
        const h = canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const cw = canvas.offsetWidth, ch = canvas.offsetHeight;
        ctx.clearRect(0, 0, cw, ch);

        const max = Math.max(...data, 1);
        const points = data.map((v, i) => ({ x: (i / (data.length - 1 || 1)) * cw, y: ch - (v / max) * (ch - 20) - 10 }));

        // Grid lines
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
          const y = (ch / 4) * i + 10;
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
        }

        // Fill
        ctx.beginPath();
        ctx.moveTo(points[0]?.x || 0, ch);
        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(points[points.length - 1]?.x || cw, ch);
        ctx.closePath();
        const grad = ctx.createLinearGradient(0, 0, 0, ch);
        grad.addColorStop(0, color + '30');
        grad.addColorStop(1, color + '05');
        ctx.fillStyle = grad;
        ctx.fill();

        // Line
        ctx.beginPath();
        points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Current value
        if (data.length > 0) {
          const last = data[data.length - 1];
          ctx.fillStyle = color;
          ctx.font = 'bold 14px Outfit';
          ctx.fillText(`${typeof last === 'number' ? last.toFixed(1) : last}%`, 8, 18);
          if (label) { ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '11px Outfit'; ctx.fillText(label, 8, 34); }
        }
      }, [data, color, label]);
      return <div className="chart-container" style={{ height }}><canvas ref={canvasRef} style={{ width: '100%', height: '100%' }} /></div>;
    }

    // ─── Login Screen ────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const handleSubmit = async (e) => {
        e.preventDefault(); setLoading(true); setError('');
        try {
          const data = await API.post('/api/auth/login', { username, password });
          if (data.token) { API.token = data.token; localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user)); onLogin(data.user); }
          else setError(data.error || 'Login failed');
        } catch { setError('Connection failed'); }
        setLoading(false);
      };
      return (
        <div className="login-screen">
          <form className="login-box" onSubmit={handleSubmit}>
            <div className="sidebar-logo" style={{ justifyContent: 'center', marginBottom: 8 }}>
              <div className="logo-icon">DZ</div>
            </div>
            <div className="login-title">Server Panel</div>
            <div className="login-sub">Sign in to manage your servers</div>
            {error && <div className="login-error">{error}</div>}
            <div className="input-group"><label className="input-label">Username</label><input className="input" value={username} onChange={e => setUsername(e.target.value)} autoFocus /></div>
            <div className="input-group"><label className="input-label">Password</label><input className="input" type="password" value={password} onChange={e => setPassword(e.target.value)} /></div>
            <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', marginTop: 8 }} disabled={loading}>{loading ? 'Signing in...' : 'Sign In'}</button>
          </form>
        </div>
      );
    }

    // ─── SERVER HUB ──────────────────────────────────────
    function ServerHubPage({ servers, onSelect }) {
      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div><div className="main-title">Server Hub</div><div className="main-subtitle">{servers.length} server instance{servers.length !== 1 ? 's' : ''} configured</div></div>
          </div>
          <div className="stat-row">
            <div className="stat-box"><div className="stat-label">Total Servers</div><div className="stat-value">{servers.length}</div></div>
            <div className="stat-box"><div className="stat-label">Running</div><div className="stat-value" style={{ color: 'var(--accent-blue)' }}>{servers.filter(s => s.status === 'running').length}</div></div>
            <div className="stat-box"><div className="stat-label">Total Players</div><div className="stat-value" style={{ color: 'var(--accent-blue)' }}>{servers.reduce((a, s) => a + (s.playerCount || 0), 0)}</div></div>
            <div className="stat-box"><div className="stat-label">Avg CPU</div><div className="stat-value">{servers.length ? (servers.reduce((a, s) => a + (s.cpu || 0), 0) / servers.length).toFixed(0) : 0}%</div></div>
          </div>
          {servers.length === 0 ? (
            <div className="empty-state"><div className="empty-icon">🎮</div><div className="empty-title">No Servers</div><p>Deploy your first DayZ server to get started.</p></div>
          ) : (
            <div className="grid grid-3">
              {servers.map(srv => (
                <div key={srv.id} className={`server-card ${srv.status}`} onClick={() => onSelect(srv.id)}>
                  <div className="server-card-header">
                    <div>
                      <div className="server-card-name">{srv.name}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>{srv.gameTitle || 'DayZ, PC'}</div>
                    </div>
                    <span className={`status-badge status-${srv.status || 'stopped'}`}><span className="status-dot" />{srv.status || 'stopped'}</span>
                  </div>
                  <div className="server-card-stats">
                    <div className="server-card-stat"><div className="server-card-stat-label">CPU</div><div className="server-card-stat-value">{(srv.cpu || 0).toFixed(0)}%</div></div>
                    <div className="server-card-stat"><div className="server-card-stat-label">RAM</div><div className="server-card-stat-value">{(srv.ram || 0).toFixed(1)}%</div></div>
                    <div className="server-card-stat"><div className="server-card-stat-label">Players</div><div className="server-card-stat-value">{srv.playerCount || 0}/{srv.maxPlayers || 60}</div></div>
                    <div className="server-card-stat"><div className="server-card-stat-label">Uptime</div><div className="server-card-stat-value">{formatUptime(srv.uptime)}</div></div>
                  </div>
                  <div className="server-card-bar"><div className="server-card-bar-fill" style={{ width: `${Math.min(srv.cpu || 0, 100)}%` }} /></div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── SERVER OVERVIEW (per server) ────────────────────
    function ServerOverviewPage({ serverId }) {
      const [status, setStatus] = useState(null);
      const [loading, setLoading] = useState(true);
      const load = useCallback(async () => {
        const s = await API.get(`/api/servers/${serverId}/status`);
        setStatus(s); setLoading(false);
      }, [serverId]);
      useEffect(() => { load(); const i = setInterval(load, 10000); return () => clearInterval(i); }, [load]);
      useEffect(() => {
        const handler = (data) => { if (data.serverId === serverId) setStatus(s => ({ ...s, status: data.status })); };
        socket.on('serverStatus', handler);
        return () => socket.off('serverStatus', handler);
      }, [serverId]);

      if (loading || !status) return <div style={{ padding: 40, color: 'var(--text-muted)' }}>Loading...</div>;
      return (
        <div>
          <div className="stat-row">
            <div className="stat-box"><div className="stat-label">Status</div><span className={`status-badge status-${status.status}`}><span className="status-dot" />{status.status}</span></div>
            <div className="stat-box"><div className="stat-label">Players</div><div className="stat-value">{status.playerCount}<span style={{ fontSize: 14, color: 'var(--text-muted)' }}>/{status.maxPlayers}</span></div></div>
            <div className="stat-box"><div className="stat-label">CPU</div><div className="stat-value">{(status.cpu || 0).toFixed(0)}%</div></div>
            <div className="stat-box"><div className="stat-label">RAM</div><div className="stat-value">{(status.ram || 0).toFixed(1)}%</div></div>
            <div className="stat-box"><div className="stat-label">Uptime</div><div className="stat-value">{formatUptime(status.uptime)}</div></div>
          </div>
          <div style={{ display: 'flex', gap: 16, marginBottom: 20 }}>
            <div className="card" style={{ flex: 1 }}>
              <div className="card-title" style={{ marginBottom: 8 }}>Server Name</div>
              <div style={{ fontSize: 18, fontWeight: 700 }}>{status.serverName || 'DayZ Server'}</div>

    // ─── METRICS PAGE (dedicated) ─────────────────────────
    function ServerMetricsPage({ serverId }) {
      const [metrics, setMetrics] = useState(null);
      const [loading, setLoading] = useState(true);
      const load = useCallback(async () => {
        const m = await API.get(`/api/servers/${serverId}/metrics`);
        setMetrics(m); setLoading(false);
      }, [serverId]);
      useEffect(() => { load(); const i = setInterval(load, 10000); return () => clearInterval(i); }, [load]);
      useEffect(() => {
        const handler = (data) => {
          if (data.serverId !== serverId) return;
          setMetrics(prev => {
            if (!prev) return prev;
            const m = { ...prev };
            m.cpu = [...(m.cpu || []), data.cpu].slice(-360);
            m.ram = [...(m.ram || []), data.ram].slice(-360);
            m.players = [...(m.players || []), data.players].slice(-360);
            m.fps = [...(m.fps || []), data.fps].slice(-360);
            m.timestamps = [...(m.timestamps || []), data.timestamp].slice(-360);
            return m;
          });
        };
        socket.on('metrics', handler);
        return () => socket.off('metrics', handler);
      }, [serverId]);

      const calcStats = (arr) => {
        if (!arr || arr.length === 0) return { current: 0, min: 0, max: 0, avg: 0 };
        const current = arr[arr.length - 1];
        const min = Math.min(...arr);
        const max = Math.max(...arr);
        const avg = arr.reduce((a, b) => a + b, 0) / arr.length;
        return { current, min, max, avg };
      };

      if (loading) return <div style={{ padding: 40, color: 'var(--text-muted)' }}>Loading metrics...</div>;
      if (!metrics) return <div style={{ padding: 40, color: 'var(--text-muted)' }}>No metrics data available.</div>;

      const cpuStats = calcStats(metrics.cpu);
      const ramStats = calcStats(metrics.ram);
      const playerStats = calcStats(metrics.players);
      const fpsStats = calcStats(metrics.fps);
      const dataPoints = metrics.timestamps?.length || 0;
      const timeSpan = dataPoints > 1 ? Math.round((new Date(metrics.timestamps[dataPoints - 1]) - new Date(metrics.timestamps[0])) / 60000) : 0;

      const StatCard = ({ label, stats, unit, color }) => (
        <div className="card">
          <div className="card-header"><div className="card-title" style={{ color }}>{label}</div><span style={{ fontSize: 11, color: 'var(--text-muted)' }}>current</span></div>
          <div className="card-value" style={{ color }}>{stats.current.toFixed(1)}{unit}</div>
          <div style={{ display: 'flex', gap: 16, marginTop: 12 }}>
            <div><div style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1 }}>Min</div><div style={{ fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 600 }}>{stats.min.toFixed(1)}{unit}</div></div>
            <div><div style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1 }}>Avg</div><div style={{ fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 600 }}>{stats.avg.toFixed(1)}{unit}</div></div>
            <div><div style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1 }}>Max</div><div style={{ fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 600 }}>{stats.max.toFixed(1)}{unit}</div></div>
          </div>
        </div>
      );

      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{dataPoints} data points · {timeSpan > 0 ? `${timeSpan}m window` : 'just started'} · updates every 15s</div>
            <button className="btn btn-secondary btn-sm" onClick={load}>🔄 Refresh</button>
          </div>
          <div className="grid grid-4" style={{ marginBottom: 20 }}>
            <StatCard label="CPU" stats={cpuStats} unit="%" color="#6cb4f0" />
            <StatCard label="RAM" stats={ramStats} unit="%" color="#c49bff" />
            <StatCard label="Players" stats={playerStats} unit="" color="#5cb85c" />
            <StatCard label="FPS" stats={fpsStats} unit="" color="#e5c07b" />
          </div>
          <div className="grid grid-2">
            <MiniChart data={metrics.cpu || []} color="#6cb4f0" height={240} label="CPU %" />
            <MiniChart data={metrics.ram || []} color="#c49bff" height={240} label="RAM %" />
            <MiniChart data={metrics.players || []} color="#5cb85c" height={240} label="Players" />
            <MiniChart data={metrics.fps || []} color="#e5c07b" height={240} label="FPS" />
          </div>
        </div>
      );
    }

    // ─── CONSOLE ─────────────────────────────────────────
    function ConsolePage({ serverId }) {
      const [logs, setLogs] = useState([]);
      const [cmd, setCmd] = useState('');
      const outputRef = useRef(null);
      useEffect(() => { API.get(`/api/servers/${serverId}/logs?limit=500`).then(setLogs); }, [serverId]);
      useEffect(() => {
        const handler = (data) => { if (data.serverId === serverId) setLogs(l => [data, ...l].slice(0, 500)); };
        socket.on('log', handler);
        return () => socket.off('log', handler);
      }, [serverId]);
      useEffect(() => { if (outputRef.current) outputRef.current.scrollTop = outputRef.current.scrollHeight; }, [logs]);
      const sendCmd = async () => {
        if (!cmd.trim()) return;
        await API.post(`/api/servers/${serverId}/rcon`, { command: cmd });
        setCmd('');
      };
      return (
        <div className="console-wrap">
          <div className="console-output" ref={outputRef}>
            {[...logs].reverse().map((log, i) => (
              <div key={i} className={`console-line ${log.level || ''}`}>
                <span className="console-time">{new Date(log.timestamp).toLocaleTimeString()}</span>
                <span>[{log.source || 'system'}]</span> {log.message}
              </div>
            ))}
          </div>
          <div className="console-input">
            <input value={cmd} onChange={e => setCmd(e.target.value)} placeholder="Enter RCON command..." onKeyDown={e => e.key === 'Enter' && sendCmd()} />

        </div>

    // ─── MODS ────────────────────────────────────────────
    function ModsPage({ serverId }) {
      const [mods, setMods] = useState([]);
      const [search, setSearch] = useState('');
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [tab, setTab] = useState('installed');
      const [popularMods, setPopularMods] = useState([]);
      const [loadingPopular, setLoadingPopular] = useState(false);
      const [installProgress, setInstallProgress] = useState({});
      const searchTimeout = useRef(null);

      useEffect(() => { API.get(`/api/servers/${serverId}/mods`).then(setMods); }, [serverId]);
      useEffect(() => {
        const handler = (data) => { if (data.serverId === serverId) setMods(data.mods); };
        socket.on('mods', handler);
        return () => socket.off('mods', handler);
      }, [serverId]);

      // Debounced search
      const handleSearch = (query) => {
        setSearch(query);
        if (searchTimeout.current) clearTimeout(searchTimeout.current);
        if (query.trim().length < 2) { setResults([]); return; }
        searchTimeout.current = setTimeout(async () => {
          setSearching(true);
          try {
            const data = await API.get('/api/workshop/search?q=' + encodeURIComponent(query.trim()));
            const items = Array.isArray(data && data.results) ? data.results : [];
            console.log('[Workshop] search returned', items.length, 'results');
            setResults(items);
          } catch(e) { console.error('[Workshop] search error:', e); window.addToast('Workshop search failed', 'error'); setResults([]); }
          setSearching(false);
        }, 400);
      };

      const doSearch = async () => {
        if (!search.trim() || search.trim().length < 2) return;
        setSearching(true);
        try {
          const data = await API.get('/api/workshop/search?q=' + encodeURIComponent(search.trim()));
          const items = Array.isArray(data && data.results) ? data.results : [];
          console.log('[Workshop] doSearch returned', items.length, 'results');
          setResults(items);
        } catch(e) { console.error('[Workshop] doSearch error:', e); window.addToast('Workshop search failed', 'error'); setResults([]); }
        setSearching(false);
      };

      const loadPopular = async () => {
        if (popularMods.length > 0) return;
        setLoadingPopular(true);
        try {
          const data = await API.get('/api/workshop/popular');
          const items = Array.isArray(data && data.results) ? data.results : [];
          setPopularMods(items);
        } catch(e) { console.error('[Workshop] popular error:', e); window.addToast('Failed to load popular mods', 'error'); }
        setLoadingPopular(false);
      };

      const isInstalled = (wid) => mods.some(m => String(m.workshopId) === String(wid));
      const isInstalling = (wid) => { const p = installProgress[wid]; return p && ['starting','downloading','installing','downloaded'].includes(p.status); };

      const install = async (workshopId, name) => {
        if (isInstalled(workshopId) || isInstalling(workshopId)) return;
        setInstallProgress(prev => ({ ...prev, [workshopId]: { status: 'starting', progress: 0, message: 'Requesting download...' } }));
        try {
          await API.post(`/api/servers/${serverId}/mods/install`, { workshopId, name });
        } catch (err) {
          window.addToast(`Install failed: ${err.message}`, 'error');
          setInstallProgress(prev => ({ ...prev, [workshopId]: { status: 'error', progress: 0, message: err.message } }));
        }
      };

      const uninstall = async (workshopId) => {
        await API.del(`/api/servers/${serverId}/mods/uninstall/${workshopId}`);
        setMods(ms => ms.filter(m => m.workshopId !== workshopId));
        window.addToast('Mod uninstalled', 'success');
      };

      const toggleMod = async (workshopId, enabled) => {
        await API.patch(`/api/servers/${serverId}/mods/${workshopId}`, { enabled: !enabled });
        setMods(m => m.map(mod => mod.workshopId === workshopId ? { ...mod, enabled: !enabled } : mod));
      };

      // Listen for install progress
      useEffect(() => {
        const handler = (data) => {
          if (data.serverId !== serverId) return;
          setInstallProgress(prev => ({ ...prev, [data.workshopId]: { status: data.status, progress: data.progress, message: data.message } }));
          if (data.status === 'complete') {
            API.get(`/api/servers/${serverId}/mods`).then(setMods);
            window.addToast(data.message, 'success');
          } else if (data.status === 'error') {
            window.addToast(`Install failed: ${data.message}`, 'error');
          }
        };
        socket.on('modInstallProgress', handler);
        return () => socket.off('modInstallProgress', handler);
      }, [serverId]);

      const formatSubs = (n) => { if (!n) return '0'; if (n >= 1000000) return `${(n/1000000).toFixed(1)}M`; if (n >= 1000) return `${(n/1000).toFixed(1)}K`; return String(n); };

      // Workshop item component with preview, metadata, progress
      const WorkshopItem = ({ item }) => {
        if (!item || !item.workshopId) return null;
        const wid = String(item.workshopId);
        const installed = isInstalled(wid);
        const progress = installProgress[wid];
        const installing = isInstalling(wid);
        const failed = progress && (progress.status === 'error' || progress.status === 'steam_guard');
        const complete = progress && progress.status === 'complete';
        const name = item.name || 'Unknown Mod';
        const desc = typeof item.description === 'string' ? item.description : '';
        const tags = Array.isArray(item.tags) ? item.tags.filter(Boolean) : [];
        const subs = Number(item.subscribers) || 0;
        const fSize = Number(item.fileSize) || 0;
        let updatedStr = '';
        try { if (item.updated) updatedStr = new Date(item.updated).toLocaleDateString(); } catch(e) { /* ignore */ }

        const btnLabel = () => {
          if (installed || complete) return '✓ Installed';
          if (installing) return ('⏳ ' + (progress.progress ? Math.round(progress.progress) + '%' : '...'));
          if (failed) return '⚠ Retry';
          return '📥 Install';
        };

        return (
          <div className={`workshop-item${installed ? ' installed' : ''}`}>
            {item.preview ? (
              <img className="workshop-thumb" src={item.preview} alt="" onError={function(e) { e.target.style.display='none'; }} />
            ) : (
              <div className="workshop-thumb" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 }}>🧩</div>
            )}
            <div className="workshop-info">
              <div className="workshop-info-name">{name}</div>
              <div className="workshop-info-meta">
                <span>{'ID: ' + wid}</span>
                {subs > 0 && <span>{'⬇ ' + formatSubs(subs)}</span>}
                {fSize > 0 && <span>{'📦 ' + formatBytes(fSize)}</span>}
                {updatedStr && <span>{'🕐 ' + updatedStr}</span>}
              </div>
              {desc && <div className="workshop-info-desc">{desc}</div>}
              {tags.length > 0 && (
                <div className="workshop-info-tags">{tags.slice(0, 5).map(function(t, i) { return <span key={i}>{String(t)}</span>; })}</div>
              )}
              {installing && (
                <div style={{ marginTop: 6 }}>
                  <div style={{ fontSize: 11, color: 'var(--accent-blue)', marginBottom: 3 }}>{progress.message || 'Preparing...'}</div>
                  <div style={{ background: 'var(--bg-deep)', borderRadius: 4, height: 6, overflow: 'hidden' }}>
                    <div style={{ width: `${progress.progress || 5}%`, height: '100%', background: 'var(--accent-blue)', borderRadius: 4, transition: 'width 0.3s ease' }} />
                  </div>
                </div>
              )}
              {failed && <div style={{ fontSize: 11, color: 'var(--accent-red)', marginTop: 4 }}>❌ {progress.message}</div>}
            </div>
            <button className="workshop-btn" disabled={installed || complete || installing}
              onClick={function() { install(wid, name); }}
              style={installing ? { background: 'var(--accent-blue)', opacity: 0.7 } : failed ? { background: 'var(--accent-red)' } : {}}>
              {btnLabel()}
            </button>
          </div>
        );
      };

      return (
        <div>
          <div className="tabs">
            <div className={`tab ${tab === 'installed' ? 'active' : ''}`} onClick={() => setTab('installed')}>🧩 Installed ({mods.length})</div>
            <div className={`tab ${tab === 'workshop' ? 'active' : ''}`} onClick={() => setTab('workshop')}>🔍 Workshop</div>
            <div className={`tab ${tab === 'popular' ? 'active' : ''}`} onClick={() => { setTab('popular'); loadPopular(); }}>🔥 Popular</div>
            <div className={`tab ${tab === 'steam' ? 'active' : ''}`} onClick={() => setTab('steam')}>⚙️ Steam</div>
          </div>

          {tab === 'installed' && (
            <div>
              {mods.length === 0 ? <div className="empty-state"><div className="empty-icon">📦</div><div className="empty-title">No Mods Installed</div><div style={{ color: 'var(--text-muted)', fontSize: 13 }}>Search the Workshop tab to find and install mods</div></div> : (
                <div>
                  {mods.map((mod, i) => (
                    <div className="mod-item" key={mod.workshopId || mod.name}>
                      <span className="mod-order">#{i + 1}</span>
                      <div className={`toggle ${mod.enabled ? 'on' : ''}`} onClick={() => toggleMod(mod.workshopId, mod.enabled)}><div className="toggle-knob" /></div>
                      <span className="mod-name" style={{ opacity: mod.enabled ? 1 : 0.4 }}>{mod.name}</span>
                      <a href={mod.workshopId ? `https://steamcommunity.com/sharedfiles/filedetails/?id=${mod.workshopId}` : '#'}
                        target="_blank" rel="noopener" className="mod-id" title="Open on Steam Workshop">
                        {mod.workshopId || 'local'}
                      </a>
                      <button className="btn btn-sm btn-danger" onClick={() => uninstall(mod.workshopId)} title="Uninstall">🗑</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {tab === 'workshop' && (
            <div>
              <div className="card" style={{ marginBottom: 16 }}>
                <div className="card-title" style={{ marginBottom: 12 }}>🔍 Search Steam Workshop</div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <div className="workshop-search-box" style={{ flex: 1 }}>
                    <span className="workshop-search-icon">🔎</span>
                    <input className="input" placeholder="Search DayZ mods on Steam Workshop..."
                      value={search} onChange={e => handleSearch(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && doSearch()} style={{ paddingLeft: 36 }} autoFocus />
                  </div>
                  <button className="btn btn-blue" onClick={doSearch} disabled={searching}>{searching ? 'Searching...' : 'Search'}</button>
                </div>
              </div>
              {searching && <div className="workshop-loading">Searching Steam Workshop...</div>}
              {!searching && results.length > 0 && (
                <div className="workshop-results">{results.map(r => <WorkshopItem key={r.workshopId} item={r} />)}</div>
              )}
              {!searching && search.length >= 2 && results.length === 0 && (
                <div className="workshop-loading">No mods found for "{search}"</div>
              )}
              {!searching && search.length < 2 && results.length === 0 && (
                <div className="workshop-loading">Type at least 2 characters to search</div>
              )}
            </div>
          )}

          {tab === 'popular' && (
            <div>
              <div className="card-title" style={{ marginBottom: 12 }}>🔥 Popular DayZ Mods</div>
              {loadingPopular && <div className="workshop-loading">Loading popular mods...</div>}
              {!loadingPopular && popularMods.length > 0 && (
                <div className="workshop-results">{popularMods.map(r => <WorkshopItem key={r.workshopId} item={r} />)}</div>
              )}
              {!loadingPopular && popularMods.length === 0 && (
                <div className="workshop-loading">No popular mods available</div>
              )}
            </div>
          )}

          {tab === 'steam' && <SteamSettingsPanel />}
        </div>
      );
    }

    function SteamSettingsPanel() {
      const [status, setStatus] = useState(null);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [guardCode, setGuardCode] = useState('');
      const [saving, setSaving] = useState(false);
      useEffect(() => { API.get('/api/steam/status').then(s => { setStatus(s); setUsername(s.username || ''); }); }, []);
      const save = async () => {
        setSaving(true);
        const body = { username };
        if (password) body.password = password;
        if (guardCode) body.guardCode = guardCode;
        const r = await API.post('/api/steam/credentials', body);
        if (r.needsGuard) window.addToast('Steam Guard code required', 'info');
        else if (r.success) { window.addToast('Steam login validated!', 'success'); setGuardCode(''); }
        else window.addToast(r.message || 'Failed', 'error');
        setSaving(false);
        API.get('/api/steam/status').then(setStatus);
      };
      return (
        <div className="card" style={{ maxWidth: 480 }}>
          <div className="card-title" style={{ marginBottom: 16 }}>Steam Credentials</div>
          <div style={{ marginBottom: 12 }}>
            {status?.loginValidated ? <span className="status-badge status-running"><span className="status-dot" />Connected as {status.username}</span> : <span className="status-badge status-stopped"><span className="status-dot" />Not connected</span>}
          </div>
          <div className="input-group"><label className="input-label">Username</label><input className="input" value={username} onChange={e => setUsername(e.target.value)} /></div>
          <div className="input-group"><label className="input-label">Password</label><input className="input" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" /></div>
          <div className="input-group"><label className="input-label">Steam Guard Code (if needed)</label><input className="input" value={guardCode} onChange={e => setGuardCode(e.target.value)} placeholder="XXXXX" /></div>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? 'Validating...' : 'Save & Validate'}</button>
        </div>
      );
    }

    // ─── FILES ───────────────────────────────────────────
    function FilesPage({ serverId }) {
